# =============================================================================
#  mini-CTF 문제 정의 (MediForum 표적)
#  import_challenges.py 가 이 파일을 읽어 CTFd 에 일괄 등록한다.
#  ⚠️ flag 가 들어 있는 강사용 파일 — 학생에게 배부 금지.
#  {VICTIM} 은 import 시 실제 희생자 IP(또는 host)로 치환된다.
#
#  ── 집필 원칙 (2026 개정) ────────────────────────────────────────────────
#   1. 넌센스 퀴즈 금지. "주소를 추측해 보세요" 같은 요구는 쓰지 않는다.
#      학생이 화면에서 **발견할 수 있는 출발점**을 문제 설명에 반드시 준다.
#   2. 브라우저 우선. 모든 문제는 크롬/엣지 + F12 만으로 풀 수 있다.
#      (curl 은 solutions/ 에 '다른 방법'으로만 남긴다)
#   3. 힌트는 3단계. 0점(방향) → 저비용(위치) → 고비용(거의 정답).
#      막힌 학생이 반드시 다음 한 걸음을 얻어 가게 한다.
#   4. 여기 적힌 flag 값은 MediForum 의 app.py FLAGS 딕셔너리와 **같아야 한다**.
#      app.py 는 부팅할 때마다 이 값을 DB 에 다시 심고,
#      ctf/verify_ctf.py 가 사이트↔정답표↔CTFd 3자 일치를 자동 검사한다.
# =============================================================================

ctf:
  name: "AI 웹 해킹 특강 mini-CTF"
  target: "MediForum (http://{VICTIM}:3003)"

challenges:
  - id: 1
    name: "페이지 속 깃발"
    category: "Recon"
    value: 50
    description: |
      **상황.** MediForum 운영자가 공지 글을 쓰면서 "나중에 지워야지" 하고 메모를 하나
      남겨 뒀습니다. 화면에는 안 보이지만, 그 메모는 아직 페이지 안에 그대로 있습니다.

      **왜 이런 일이 생기나요?** 우리가 브라우저에서 보는 화면은 서버가 보내 준 **HTML
      원본**을 예쁘게 그려 놓은 것입니다. 원본에는 화면에 안 그려지는 부분(주석)도 함께
      들어 있습니다. 개발자가 "임시 메모"를 주석으로 적고 지우지 않으면, 그 메모는 그
      페이지를 여는 **누구에게나** 보입니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. `http://{VICTIM}:3003` 에 접속합니다.
      2. 게시판에서 **[공지]** 로 시작하는 글을 엽니다.
      3. 그 페이지에서 `Ctrl + U` 를 누릅니다 (= 페이지 소스 보기).
         맥은 `Option + Command + U` 입니다.
      4. 소스 창에서 `Ctrl + F` 로 `flag` 를 찾아보세요.

      찾은 `flag{...}` 를 중괄호까지 통째로 아래에 넣으면 됩니다.
    flag: "flag{v13w_s0urc3_r3con}"
    hints:
      - { content: "화면을 아무리 봐도 없습니다. '페이지 소스 보기(Ctrl+U)' 로 HTML 원본을 열어야 보입니다.", cost: 0 }
      - { content: "게시판 글 중 제목이 [공지] 로 시작하는 글의 소스를 보세요. 다른 글에는 없습니다.", cost: 5 }
      - { content: "HTML 주석은 <!-- 로 시작해서 --> 로 끝납니다. 소스 창에서 Ctrl+F 로 '<!--' 또는 'TODO' 를 검색해 보세요.", cost: 10 }

  - id: 2
    name: "인증 없는 회원 API"
    category: "Web"
    value: 100
    description: |
      **상황.** MediForum 의 **회원 찾기** 화면은 검색어를 넣으면 회원 목록을 보여 줍니다.
      그런데 이 화면은 스스로 데이터를 갖고 있지 않습니다. 여러분이 검색 버튼을 누르는
      순간, 브라우저가 **뒤에서 서버의 API 주소를 몰래 호출**해 데이터를 받아 옵니다.

      **왜 이게 문제인가요?** 화면에는 "로그인하세요" 라고 잠금을 걸어 놓고, 정작 뒤에서
      부르는 API 에는 잠금을 안 거는 실수가 아주 흔합니다. 그러면 공격자는 화면을 거치지
      않고 API 를 직접 불러 **전 회원의 개인정보**를 통째로 가져갑니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. `http://{VICTIM}:3003/search` (상단 메뉴 **회원 찾기**) 로 갑니다.
      2. `F12` 를 눌러 개발자도구를 열고 **Network(네트워크)** 탭을 켭니다.
      3. 검색어에 `admin` 을 넣고 검색을 누릅니다.
      4. Network 탭에 새로 나타난 줄을 클릭하면, 브라우저가 어떤 주소를 불렀는지와
         서버가 돌려준 **응답(Response / 미리보기)** 을 볼 수 있습니다.
      5. 응답에서 역할(`role`)이 `admin` 인 사람의 **비밀 키(`api_key`)** 를 찾으세요.
         그 값이 그대로 깃발입니다.

      💡 이 API 주소는 `http://{VICTIM}:3003/robots.txt` 에도 적혀 있습니다.
      (robots.txt 는 "검색엔진아 여기는 긁지 마" 라고 적어 두는 파일인데,
      역설적으로 **숨기고 싶은 주소 목록**이 되어 정찰의 단골 출발점입니다.)
    flag: "flag{n0_4uth_us3r_ap1}"
    hints:
      - { content: "F12 → Network 탭을 켜 둔 채로 검색 버튼을 누르세요. 화면이 뒤에서 어떤 주소를 부르는지 그대로 보입니다.", cost: 0 }
      - { content: "Network 목록에서 users 가 들어간 줄을 클릭 → Response(응답) 탭을 보세요. JSON(중괄호 덩어리)이 나옵니다. 그 주소를 브라우저 주소창에 그대로 붙여 넣어도 똑같이 보입니다.", cost: 10 }
      - { content: "응답에서 \"role\":\"admin\" 인 사람을 찾고, 같은 줄에 있는 \"api_key\" 값을 보세요. 그 값 자체가 flag{...} 모양입니다.", cost: 20 }

  - id: 3
    name: "남의 진료기록 (IDOR)"
    category: "Web"
    value: 150
    description: |
      **상황.** MediForum 에는 **진료기록 보관함**이 있습니다. 목록에는 기록 번호와 날짜만
      보이고, "자세한 내용은 본인 기록만 볼 수 있습니다" 라고 안내합니다.
      정말 그럴까요?

      **개념 — IDOR.** 주소창의 `/records/3` 에서 `3` 은 "3번 기록을 보여 줘" 라는 뜻입니다.
      안전한 서버라면 기록을 꺼내기 전에 **"이 기록이 정말 당신 것인가?"** 를 확인해야
      합니다. 그 확인을 빠뜨리면, 번호만 바꿔도 남의 기록이 그대로 열립니다.
      호텔에서 301호 열쇠로 302호 문까지 열리는 것과 같습니다.
      이런 결함을 **IDOR(Insecure Direct Object Reference)** 라고 부릅니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. 상단 메뉴 **진료기록** (`http://{VICTIM}:3003/records`) 으로 갑니다.
      2. 아무 기록이나 **[상세 보기]** 를 누릅니다. 주소창을 보세요 — 끝에 번호가 있습니다.
      3. 상세 화면 아래의 **[다음 기록 ▶]** 버튼을 누르거나,
         주소창의 번호를 `1`, `2`, `3` … 으로 직접 바꿔 가며 열어 봅니다.
      4. 어떤 기록의 **처방 / 소견** 칸에 깃발이 숨어 있습니다.

      막히지 않고 남의 기록이 계속 열린다는 사실 자체가 이미 취약점의 증거입니다.
    flag: "flag{1d0r_m3d_r3c0rds}"
    hints:
      - { content: "진료기록 상세 페이지 주소의 맨 끝 숫자가 '몇 번 기록'인지를 뜻합니다. 그 숫자를 바꾸면 어떻게 될까요?", cost: 0 }
      - { content: "1번부터 차례로 열어 보세요. 상세 화면 맨 아래 [다음 기록 ▶] 버튼을 계속 눌러도 됩니다. 총 5개가 있습니다.", cost: 15 }
      - { content: "환자 이름이 '관리자'인 VIP 종합검진 기록을 찾으세요. 깃발은 그 기록의 '처방 / 소견' 칸에 있습니다.", cost: 25 }

  - id: 4
    name: "관리자 쪽지 도청"
    category: "Web"
    value: 150
    description: |
      **상황.** 어떤 사이트에는 운영자만 쓰는 **관리자 콘솔**이 있습니다. 보통은 관리자로
      로그인해야만 열립니다. 그런데 MediForum 의 관리자 콘솔은 **로그인 검사를 통째로
      빠뜨렸습니다.** 주소만 알면 누구나 들어갑니다.

      **어떻게 그 주소를 아나요?** 찍어서 맞히는 게 아닙니다. 사이트가 스스로 알려 줍니다.
      `http://{VICTIM}:3003/robots.txt` 를 브라우저 주소창에 넣어 보세요.
      "검색엔진에 노출되면 곤란한 주소" 목록이 그대로 적혀 있습니다 — 정찰의 정석입니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. `http://{VICTIM}:3003/robots.txt` 를 열어 어떤 경로가 적혀 있는지 읽습니다.
      2. 거기 적힌 **관리자 콘솔** 주소로 들어갑니다. (로그인하지 않아도 열립니다)
      3. 메뉴 중 **✉️ 쪽지 감사** 를 누릅니다. 회원들이 주고받은 쪽지가 전부 표로 뜹니다.
      4. 관리자가 보낸 쪽지 하나에 서버 비밀번호처럼 생긴 깃발이 적혀 있습니다.

      **실전에서는?** 관리자 화면 하나가 안 잠기면, 그 안에 모인 모든 사람의 사생활이
      한꺼번에 샙니다. 문패만 'VIP 전용'이고 문은 열려 있는 방인 셈입니다.
    flag: "flag{4dm1n_dm_l34k}"
    hints:
      - { content: "주소를 찍어서 맞히지 마세요. /robots.txt 를 먼저 열어 보면 사이트가 숨기고 싶어 하는 주소들이 그대로 적혀 있습니다.", cost: 0 }
      - { content: "robots.txt 에 적힌 /admin 으로 들어가세요. 로그인하지 않아도 관리자 콘솔이 그냥 열립니다.", cost: 15 }
      - { content: "관리자 콘솔에서 [✉️ 쪽지 감사] 버튼을 누르세요. 표의 body(본문) 칸을 훑어보면 '서버 백업 비밀번호' 라고 적힌 쪽지가 있습니다.", cost: 25 }

  - id: 5
    name: "예측 가능한 세션"
    category: "Web"
    value: 200
    description: |
      **상황.** 로그인에 성공하면 서버는 여러분에게 **출입증**을 하나 발급합니다. 이 출입증은
      브라우저에 **쿠키**로 저장되고, 이후 모든 요청에 자동으로 따라갑니다. 서버는 이
      출입증 번호만 보고 "아, 아까 그 사람이군" 하고 알아봅니다.

      **문제는 번호를 매기는 방식입니다.** MediForum 은 출입증 번호를 손님이 들어온
      **순서대로** 매깁니다 — `sess-2001`, `sess-2002`, `sess-2003` … 이런 식이죠.
      그러면 "가장 먼저 들어온 사람의 번호"를 추측할 수 있게 됩니다.
      좋은 출입증 번호는 **아무도 못 맞히는 무작위 값**이어야 합니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. `http://{VICTIM}:3003/register` 에서 아무 계정이나 하나 만들고 로그인합니다.
      2. `F12` → **Application(응용 프로그램)** 탭 → 왼쪽 **Cookies** → 사이트 주소 클릭.
         (파이어폭스는 **저장소(Storage)** 탭)
      3. `MFSID` 라는 쿠키가 보입니다. 값이 어떤 규칙인지 관찰하세요.
         친구와 값을 비교하거나, 계정을 하나 더 만들어 로그인해 보면 규칙이 보입니다.
      4. `robots.txt` 에 적힌 **관리자 전용 금고** 주소로 들어가 봅니다 → 403(접근 거부).
         그 화면의 안내 문구도 잘 읽어 보세요. 힌트가 들어 있습니다.
      5. 개발자도구에서 `MFSID` 값을 **더 이른(작은) 번호**로 직접 고쳐 쓰고,
         금고 페이지를 새로고침(F5)합니다.

      **주의.** 남의 출입증을 베껴 쓰는 이 행위는 실제 서비스에서 하면 **명백한 범죄**
      (세션 하이재킹)입니다. 오늘은 우리가 세운 연습용 표적에서만 합니다.
    flag: "flag{pr3d1ct4bl3_s3ss10n}"
    hints:
      - { content: "F12 → Application(저장소) → Cookies 에서 MFSID 값을 확인하세요. 값이 sess-숫자 모양이라면, 그 숫자는 무엇을 뜻할까요?", cost: 0 }
      - { content: "계정을 두 개 만들어 각각 로그인해 보세요. sess-2001, sess-2002 처럼 1씩 커집니다. 관리자는 서비스 오픈 첫날 로그인했으니 훨씬 이른(작은) 번호를 씁니다. 접근 거부 화면의 '운영 메모' 도 읽어 보세요.", cost: 20 }
      - { content: "개발자도구 Cookies 목록에서 MFSID 값을 더블클릭해 sess-1001 로 고친 뒤, /admin/secret 페이지에서 F5(새로고침) 하세요.", cost: 40 }

  - id: 6
    name: "저장형 XSS — 관리자 봇 낚기"
    category: "Web"
    value: 200
    description: |
      **상황.** MediForum 에는 **신고 기능**이 있습니다. 이상한 글을 발견하면 [🚨 신고하기]
      를 누르고, 그러면 **관리자(봇)** 가 그 글을 자기 브라우저로 열어 확인합니다.
      운영자가 신고 글을 검토하는, 어느 커뮤니티에나 있는 평범한 기능이죠.

      **개념 — 저장형 XSS.** MediForum 은 글 본문을 **아무 검사 없이** 화면에 그립니다.
      그래서 본문에 `<script>` 같은 실행 가능한 코드를 적어 저장하면, 그 글은 이제
      "함정"이 됩니다. 그 글을 **여는 사람의 브라우저**에서 내 코드가 대신 실행되니까요.
      방명록에 마법 주문을 적어 두고 읽는 사람이 걸리게 만드는 것과 같습니다.
      그리고 이 함정에 걸릴 사람으로, 우리는 **가장 권한이 높은 관리자**를 고릅니다.

      **이렇게 시작하세요 (브라우저만 사용).**
      1. `http://{VICTIM}:3003/register` 에서 계정을 만들고 로그인합니다.
      2. **+ 새 글 쓰기** 로 글을 하나 씁니다. 제목은 아무거나, **본문에 아래를 그대로**
         적습니다:
         `<script>alert('xss')</script>`
      3. 저장된 글 아래의 **[🚨 신고하기]** 버튼을 눌러 내 글을 신고합니다.
         (내 글을 내가 신고하는 게 어색하지만, 관리자를 불러오는 가장 빠른 방법입니다)
      4. `robots.txt` 에서 본 **관리자 콘솔**(`/admin`)로 갑니다.
      5. **🤖 신고 검토(관리자 봇)** 를 누릅니다. 봇이 신고된 글을 열어 보고,
         본문에서 실행 가능한 코드가 발견되면 **봇이 들고 있던 관리자 코드가 화면에
         노출**됩니다. 그것이 깃발입니다.

