{% extends "base.html" %}
{% block title %}로그인 · AI 웹 해킹 특강{% endblock %}
{% block content %}
<div class="section" style="max-width:460px;margin:40px auto">
  <h2>로그인</h2>
  {% if error %}<div class="info warn">⚠️ {{ error }}</div>{% endif %}
  <div class="info">
    <form method="POST" class="form">
      <input type="hidden" name="next" value="{{ next or '' }}">
      <label>아이디</label>
      <input name="username" required autofocus>
      <label>비밀번호</label>
      <input name="password" type="password" required>
      <button class="btn" type="submit">로그인</button>
    </form>
  </div>
  <p class="muted" style="font-size:13.5px">
    계정이 없다면 <a href="/register">회원가입</a>. 비밀번호를 잊었다면 강사에게 문의하세요.
  </p>
</div>
{% endblock %}
