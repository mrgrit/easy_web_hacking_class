# =============================================================================
#  AI 웹 해킹 특강 — 실습 인프라
# =============================================================================
#  ⚠️  여기 올라가는 표적 사이트들은 "일부러 취약하게" 만든 교육용입니다.
#      절대 인터넷에 공개하지 마세요. 폐쇄망 / 로컬 VM 안에서만 띄웁니다.
#
#  두 역할로 나뉩니다 (profile). 교실에서는 이 둘을 **다른 컴퓨터**에 띄웁니다.
#
#   ── profile: hub  (강사 서버 1대, 중앙) ───────────────────────────────
#     - course-site : 강좌 포털·교과서·실습·담벼락·회원  http://<hub-ip>:8090
#     - ctfd        : mini-CTF 플랫폼(리더보드)          http://<hub-ip>:8000
#     - ai-helper   : CTF 힌트 챗봇(flag 미노출)          http://<hub-ip>:8001
#
#   ── profile: victim  (학생 PC 각자) ──────────────────────────────────
#     - dvwa        : Week 03 웹 해킹 표적                http://localhost:8088
#     - neobank     : Week 04 AI 모의해킹 표적            http://localhost:3001
#     - mediforum   : Week 05 mini-CTF 표적               http://localhost:3003
#     - aicompanion : 특별 세션(AI 서비스 모의해킹) 표적   http://localhost:3005
#
#   ── profile: extras  (강사 재량 보너스) ──────────────────────────────
#     - govportal / adminconsole / juiceshop
#
#  기동:
#     ./start.sh hub       ./start.sh victim       ./start.sh        (둘 다)
#     ./start.sh extras    (보너스까지)
#
#  왜 나누나? 표적을 한 대로 공유하면 한 학생이 DVWA 비밀번호를 바꾸거나 XSS 를 심는
#  순간 반 전체 실습이 망가집니다. 채점 공정성 문제도 생깁니다. 자세한 내용은
#  ../docs/DEPLOYMENT.md 참고.
# =============================================================================

name: ezweb

services:
  # ===========================================================================
  #  hub — 강사 서버 (중앙 1대)
  # ===========================================================================

  # ---- 강좌 포털 웹사이트 (커리큘럼·교과서·실습·담벼락·회원·CTFd 연동) -------
  course-site:
    build:
      context: ..
      dockerfile: site/Dockerfile
    image: ezweb-course-site:latest
    container_name: ezweb-course-site
    ports:
      - "8090:8090"
    environment:
      # 운영 시 반드시 바꾸세요. 세션 쿠키 서명에 쓰입니다.
      - SECRET_KEY=${SITE_SECRET_KEY:-ezweb-course-site-change-me}
      # 회원 DB 는 볼륨에 둔다(재빌드해도 계정 유지)
      - USER_DB=/data/users.db
      # 이 코드를 가입 폼의 '관리자 코드' 칸에 넣으면 admin 등급으로 가입된다.
      - ADMIN_SIGNUP_CODE=${ADMIN_SIGNUP_CODE:-ezweb-admin-2026}
      # CTFd 연동 — 설정하면 강좌 사이트 회원가입 시 CTF 계정도 자동 생성된다.
      #   CTFD_ADMIN_TOKEN 은 CTFd → Settings → Access Tokens 에서 발급 후 .env 에 넣는다.
      - CTFD_URL=${CTFD_URL:-http://ctfd:8000}
      - CTFD_ADMIN_TOKEN=${CTFD_ADMIN_TOKEN:-}
      - CTFD_PUBLIC_URL=${CTFD_PUBLIC_URL:-}
    volumes:
      - site-data:/data
    profiles: ["hub"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- CTFd (CTF 플랫폼 — 회원가입 / 리더보드) ------------------------------
  ctfd:
    image: ctfd/ctfd:3.7.0
    container_name: ezweb-ctfd
    user: "0:0"   # /data 볼륨(루트 소유)에 sqlite 쓰기 위해 root 로 실행
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - LOG_FOLDER=/var/log/CTFd
      - SECRET_KEY=${CTFD_SECRET_KEY:-ezweb-ctf-change-me}
      # DB 는 쓰기 가능한 named volume(/data)에 둔다. (호스트 파일 bind-mount 시 readonly 오류)
      - DATABASE_URL=sqlite:////data/ctfd.db
    volumes:
      - ctfd-uploads:/var/uploads
      - ctfd-logs:/var/log/CTFd
      - ctfd-db:/data
    profiles: ["hub"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- mini-CTF AI 도우미 (힌트 챗봇, flag 미노출) --------------------------
  ai-helper:
    build: ../ctf/ai-helper
    image: ezweb-ai-helper:latest
    container_name: ezweb-ai-helper
    ports:
      - "8001:8001"
    environment:
      # 셋 다 비우면 '오프라인 폴백'(문제별 단계 힌트)으로 항상 동작한다.
      # 이 특강은 오픈 모델을 우선 쓴다:  OLLAMA_URL=http://<dgx-spark-ip>:11434
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:32b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5}
    profiles: ["hub"]
    restart: unless-stopped
    networks: [ezweb]

  # ===========================================================================
  #  victim — 학생 PC 각자 (표적)
  # ===========================================================================

  # ---- Week 03: DVWA (Damn Vulnerable Web Application) ----------------------
  #  ⚠️ DVWA 이미지에는 데이터베이스가 들어 있지 않다. 반드시 아래 dvwa-db 와 짝으로 띄워야
  #     하며, 이미지가 실제로 읽는 환경변수는 DB_SERVER / DB_DATABASE / DB_USER /
  #     DB_PASSWORD / DB_PORT 다. (예전에 DVWA_DB_PASSWORD 라는 없는 이름을 주고 DB 컨테이너도
  #     빠뜨려서, 로그인 시 'mysqli_sql_exception: Connection refused' 로 Week 03 전체가
  #     동작하지 않았다. 같은 실수 반복 금지.)
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: ezweb-dvwa
    ports:
      - "8088:80"
    environment:
      - DB_SERVER=dvwa-db
      - DB_DATABASE=dvwa
      - DB_USER=dvwa
      - DB_PASSWORD=p@ssw0rd
      - DB_PORT=3306
      # ★ 보안등급은 브라우저 쿠키에 저장된다. 쿠키가 없는 새 브라우저는 이 값으로 시작한다.
      #   기본값이 impossible 이라 학생이 매번 Security→Low 를 눌러야 했고, 안 누르면
      #   Week 03 의 모든 페이로드가 조용히 실패했다. low 로 고정해 그 사고를 없앤다.
      - DEFAULT_SECURITY_LEVEL=low
    depends_on:
      dvwa-db:
        condition: service_healthy
    profiles: ["victim"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- DVWA 전용 데이터베이스 (학생은 직접 만질 일 없음) ---------------------
  dvwa-db:
    image: docker.io/library/mariadb:10
    container_name: ezweb-dvwa-db
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa-root
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - dvwa-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles: ["victim"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- Week 04: NeoBank (가상 은행, 커스텀 취약 사이트) ----------------------
  neobank:
    build: ./vuln-sites/neobank
    image: ezweb-neobank:vulnerable
    container_name: ezweb-neobank
    ports:
      - "3001:3001"
    profiles: ["victim"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- Week 05: MediForum (의료 커뮤니티, mini-CTF 표적) ---------------------
  #  부팅할 때마다 깃발을 다시 심으므로(ensure_ctf_flags), 사이트에서 본 깃발과
  #  ctf/challenges.yml 의 정답이 항상 일치한다.
  mediforum:
    build: ./vuln-sites/mediforum
    image: ezweb-mediforum:vulnerable
    container_name: ezweb-mediforum
    ports:
      - "3003:3003"
    profiles: ["victim"]
    restart: unless-stopped
    networks: [ezweb]

  # ---- 특별 세션: AICompanion (사내 AI 챗봇 흉내, LLM 취약점 표적) -----------
  #  기본은 mock 모드 — 진짜 모델 없이도 전부 실습된다.
  #  실제 모델로 바꾸려면 LLM_BACKEND=ollama + OLLAMA_URL 을 주거나,
  #  사이트의 ⚙ 모델설정(/admin) 화면에서 서버 주소를 입력하면 된다.
  aicompanion:
    build: ./vuln-sites/aicompanion
    image: ezweb-aicompanion:vulnerable
    container_name: ezweb-aicompanion
    ports:
      - "3005:3005"
    environment:
      - LLM_BACKEND=${AIC_LLM_BACKEND:-mock}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:32b}
      # 교실 부하 방지용 모델 크기 상한(B). DGX Spark 를 쓴다면 넉넉히 올린다.
      - MAX_MODEL_PARAM_B=${AIC_MAX_MODEL_PARAM_B:-100}
    profiles: ["victim"]
    restart: unless-stopped
    networks: [ezweb]

  # ===========================================================================
  #  extras — 보너스 (강사 재량)
  # ===========================================================================
  govportal:
    build: ./vuln-sites/govportal
    image: ezweb-govportal:vulnerable
    container_name: ezweb-govportal
    ports: ["3002:3002"]
    profiles: ["extras"]
    networks: [ezweb]

  adminconsole:
    build: ./vuln-sites/adminconsole
    image: ezweb-adminconsole:vulnerable
    container_name: ezweb-adminconsole
    ports: ["3004:3004"]
    profiles: ["extras"]
    networks: [ezweb]

  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: ezweb-juiceshop
    ports: ["3000:3000"]
    profiles: ["extras"]
    networks: [ezweb]

networks:
  ezweb:
    driver: bridge

volumes:
  ctfd-uploads:
  ctfd-logs:
  ctfd-db:
  site-data:
  dvwa-db-data:
