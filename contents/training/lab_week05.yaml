lab_id: ezweb-week05
title: "mini-CTF — MediForum 깃발 사냥 (6문제, 브라우저만으로)"
course: ai-web-hacking
week: 5
description: |
  배운 모든 기법을 게임으로 겨룬다. 처음 보는 표적 MediForum(:3003)에 숨은 깃발 6개를 찾아
  CTFd(:8000)에 제출해 점수를 얻는다.

  ⭐ **6문제 전부 브라우저(크롬/엣지) + F12 만으로 풀 수 있다.** 명령어를 외울 필요도, 주소를
  찍어서 맞힐 필요도 없다. 사이트가 스스로 다음 단계를 알려 준다 — `robots.txt` 를 읽고,
  F12 Network 로 화면이 부르는 API 를 보고, 주소창의 번호를 바꾸고, 쿠키를 들여다보고,
  화면의 버튼을 누르면 된다.

  이 실습지는 '방향'만 알려준다 — 정확한 깃발 값과 최종 풀이는 적지 않는다(그게 CTF다).
  막히면 AI 도우미에게 방향을 물어라(깃발은 안 알려준다).
  ※ 강사용 상세 풀이는 solutions/SOLUTIONS.md 에 별도 보관(학생 배부 금지).
difficulty: medium
duration_minutes: 240
prerequisites:
  - "Week 03·04 통과(정찰·IDOR·인증결함·세션·XSS 체득)"
  - "내 PC에서 ./start.sh victim 으로 MediForum(:3003) 기동"
  - "강사 서버의 CTFd(:8000) 회원가입 완료 (강좌 사이트에서 가입하면 자동 생성됨)"
  - "브라우저 + F12 개발자도구. curl 은 전혀 필요 없다."
objectives:
  - "CTFd에 깃발을 제출해 점수를 얻고 리더보드에서 순위를 확인한다"
  - "robots.txt·페이지 소스·F12 Network 로 '숨은 경로'를 추측이 아니라 발견으로 찾는다"
  - "IDOR·인증결함을 새 사이트에 스스로 적용한다"
  - "예측 가능한 세션과 저장형 XSS(응용)로 보스 문제를 푼다"
  - "AI 도우미에게 좋은 질문으로 힌트를 얻는다"
pass_threshold: 0.5
steps:

  - order: 1
    instruction: |
      ## 🎯 워밍업 — 정찰 준비 + 1번 문제 (페이지 속 깃발)
      CTFd(:8000)에 로그인해 문제 화면에 익숙해지고, 첫 깃발을 캔다.
      ## 개념 한 줄(배운 곳: W03 개발자도구)
      화면에 안 보여도 페이지 '소스'에는 더 많은 게 적혀 있다.
      ## 🔎 이렇게 시작한다 (브라우저만)
      1. **먼저 정찰의 첫 삽**: 주소창에 `http://<victim-ip>:3003/robots.txt` 를 넣어 본다.
         "검색엔진 수집 금지" 목록인데, 사실은 **숨기고 싶은 주소 목록**이다.
         여기 적힌 경로들을 종이에 적어 두자 — 오늘 4·5·6번의 지도다.
      2. `http://<victim-ip>:3003` 접속 → 게시판에서 **[공지]** 로 시작하는 글을 연다.
      3. 그 페이지에서 `Ctrl + U` (페이지 소스 보기). 맥은 `Option + Command + U`.
      4. 소스 창에서 `Ctrl + F` → `flag` 또는 `TODO` 를 검색한다.
      ## ✅ 합격
      flag{...} 형태의 깃발을 찾아 CTFd 1번 문제에 제출 → 정답 처리.
      ## 🤖 AI 도우미 질문 예시
      "웹페이지에서 화면에는 안 보이는데 소스에는 있는 정보는 어디서 봐?"
      ## 🧰 팁
      - 깃발은 `flag{` 부터 `}` 까지 **통째로**, 앞뒤 공백 없이 제출한다.
      - `Ctrl+U` 가 안 되는 브라우저면 주소창 앞에 `view-source:` 를 붙여도 된다.
    hint: "먼저 /robots.txt 를 읽고 지도를 얻는다. 그다음 [공지] 글에서 Ctrl+U."
    category: recon
    points: 10
    answer: |
      방법: /robots.txt 로 경로 지도를 확보한 뒤, [공지] 게시글의 페이지 소스(HTML 주석)에서 깃발을 찾는다.
      정확한 위치·깃발 값은 solutions/SOLUTIONS.md (강사용) 참조.
    answer_detail: "정찰=화면 너머 소스 관찰 + robots.txt 읽기. 학생이 소스/주석에서 깃발을 찾아 CTFd에 제출·정답 처리되면 통과. robots.txt 를 먼저 보게 한 것은 이후 문제들의 '주소를 어떻게 알아내나' 를 구조적으로 해결하기 위함이다."
    verify:
      type: ctfd_submit
      check: "CTFd 1번(Recon) 문제 정답 처리."
    target: victim

  - order: 2
    instruction: |
      ## 🎯 인증 없는 회원 API (PII)
      화면이 뒤에서 부르는 API 를 찾아내, 관리자의 비밀 키를 줍는다.
      ## 개념 한 줄(배운 곳: W04 PII 노출 · F12 Network)
      화면에는 잠금을 걸어 놓고 뒤에서 부르는 API 에는 안 거는 실수가 아주 흔하다.
      ## 🔎 이렇게 시작한다 (브라우저만)
      1. 상단 메뉴 **회원 찾기**(`/search`)로 간다.
      2. `F12` → **Network(네트워크)** 탭을 켠다.
      3. 검색어에 `admin` 을 넣고 검색을 누른다.
      4. Network 목록에 **새로 생긴 줄**을 클릭 → **Response(응답)** 또는 미리보기 탭.
         → 브라우저가 어떤 주소를 불렀는지, 서버가 무엇을 돌려줬는지 그대로 보인다.
      5. 그 주소를 **주소창에 그대로 붙여 넣어** 본다. 로그인하지 않았는데도 열린다.
      6. 응답에서 역할(`role`)이 `admin` 인 사람의 **비밀 키(`api_key`)** 를 찾는다.
      ## ✅ 합격
      관리자의 비밀 키(=깃발)를 찾아 CTFd 2번에 제출.
      ## 🤖 AI 도우미 질문 예시
      "화면이 뒤에서 어떤 주소를 부르는지 브라우저로 어떻게 봐?"
      ## 🧰 팁
      - 검색 결과 표의 **API key** 칸에도 그대로 보인다. F12 는 "왜 보이는지"를 이해하는 도구다.
      - 1번에서 읽은 robots.txt 에도 이 주소가 적혀 있다.
    hint: "F12 → Network 탭을 켜고 검색을 눌러, 화면이 부르는 주소를 본다"
    category: web
    points: 15
    answer: |
      방법: /search 화면이 호출하는 회원 목록 API 를 F12 Network 로 발견 → 응답에서 role=admin 의 api_key.
      정확한 엔드포인트·깃발은 solutions/SOLUTIONS.md 참조.
    answer_detail: "인증 누락 API에서 PII(api_key)가 평문 노출. 이번 개정에서 /search 를 클라이언트 fetch 방식으로 바꿔, 학생이 '주소를 추측'하지 않고 'F12 로 발견' 하도록 만들었다. 학생이 관리자 키=깃발을 제출하면 통과."
    verify:
      type: ctfd_submit
      check: "CTFd 2번(PII API) 문제 정답 처리."
    target: victim

  - order: 3
    instruction: |
      ## 🎯 남의 진료기록 (IDOR)
      주소의 번호만 바꿔 남의 진료기록을 연다.
      ## 개념 한 줄(배운 곳: W04 IDOR)
      주소의 id 만 바꿔도 서버가 "이거 네 거 맞아?"를 안 물으면 남의 데이터가 보인다.
      ## 🔎 이렇게 시작한다 (브라우저만)
      1. 상단 메뉴 **진료기록**(`/records`)으로 간다. 기록 목록이 보인다.
      2. 아무거나 **[상세 보기]** 를 누른다. **주소창 끝의 숫자**를 확인한다.
      3. 상세 화면 아래 **[다음 기록 ▶]** 버튼을 계속 누르거나,
         주소창 숫자를 `1`, `2`, `3` … 으로 직접 바꿔 가며 열어 본다.
      4. 어떤 기록의 **처방 / 소견** 칸을 잘 읽는다.
      ## ✅ 합격
      깃발이 담긴 진료기록을 찾아 CTFd 3번에 제출.
      ## 🤖 AI 도우미 질문 예시
      "IDOR 가 뭐야? 주소의 번호를 어떻게 바꿔봐야 해?"
      ## 🧰 생각해 볼 것
      "나는 로그인도 안 했는데 왜 남의 진료기록이 보이지?" — 이 질문의 답이 곧 취약점이다.
    hint: "진료기록 상세 주소의 맨 끝 숫자를 1부터 바꿔본다"
    category: idor
    points: 15
    answer: |
      방법: /records 목록 → 상세 페이지의 id 를 순회해 깃발이 담긴 레코드를 찾는다.
      정확한 경로·깃발은 solutions/SOLUTIONS.md 참조.
    answer_detail: "IDOR로 임의 진료기록 열람. 이번 개정에서 HTML 목록/상세 페이지(/records, /records/<id>)를 추가해 주소창 조작만으로 풀리게 했다(이전에는 API 주소를 추측해야 했음). 깃발 레코드를 찾아 제출하면 통과."
    verify:
      type: ctfd_submit
      check: "CTFd 3번(IDOR) 문제 정답 처리."
    target: victim

  - order: 4
    instruction: |
      ## 🎯 관리자 쪽지 도청
      잠기지 않은 관리자 콘솔에 들어가 회원들의 쪽지를 엿본다.
      ## 개념 한 줄(배운 곳: W03/W04 인증 결함)
      '관리자용'이라면서 정작 로그인 검사를 안 하는 화면·API 가 있다.
      ## 🔎 이렇게 시작한다 (브라우저만)
      1. 1번 문제에서 읽은 **`/robots.txt`** 를 다시 펼친다. 관리자 관련 경로가 적혀 있다.
      2. 거기 적힌 **관리자 콘솔** 주소로 들어간다. 로그인하지 않았는데 열린다.
      3. 메뉴에서 **✉️ 쪽지 감사** 를 누른다. 회원들이 주고받은 쪽지가 표로 전부 뜬다.
      4. `body`(본문) 칸을 훑어본다. 관리자가 보낸 쪽지 하나가 수상하다.
      ## ✅ 합격
      관리자 쪽지에서 깃발을 찾아 CTFd 4번에 제출.
      ## 🤖 AI 도우미 질문 예시
      "관리자 전용인데 인증이 빠진 화면은 어떻게 찾아?"
      ## 🧰 팁
      - F12 → Network 를 켜 두고 버튼을 누르면, 그 화면이 부르는 API 주소도 함께 보인다(2번 응용).
    hint: "/robots.txt 에 적힌 관리자 콘솔로 들어가 [쪽지 감사]를 누른다"
    category: web
    points: 15
    answer: |
      방법: robots.txt → 인증 없는 관리자 콘솔 → 쪽지 감사 메뉴 → 깃발이 담긴 쪽지.
      정확한 경로·깃발은 solutions/SOLUTIONS.md 참조.
    answer_detail: "관리자 콘솔·DM API 인증 누락(V10). 이번 개정에서 robots.txt 와 HTML 관리자 콘솔을 추가해, '주소 추측' 없이 발견으로 도달하게 했다. 깃발 DM을 찾아 제출하면 통과."
    verify:
      type: ctfd_submit
      check: "CTFd 4번(관리자 DM) 문제 정답 처리."
    target: victim

  - order: 5
    instruction: |
      ## 🎯 (응용) 예측 가능한 세션 — 관리자로 변신
      쿠키 값의 규칙을 관찰해 관리자 세션을 가로채고, 관리자 전용 금고를 연다.
      ## 개념 한 줄(배운 곳: W03 쿠키/세션)
      세션 쿠키가 'sess-2001'처럼 규칙적이면, 값을 바꿔 남의 세션으로 들어갈 수 있다.
      ## 🔎 이렇게 시작한다 (브라우저만)
      1. `/register` 에서 아무 계정이나 만들고 **로그인**한다.
      2. `F12` → **Application**(파이어폭스는 **저장소**) → 왼쪽 **Cookies** → 사이트 주소 클릭.
      3. `MFSID` 쿠키 값을 본다. **어떤 규칙인지 관찰한다.**
         - 계정을 하나 더 만들어 시크릿 창에서 로그인해 보면 규칙이 확실해진다.
      4. robots.txt 에 적힌 **관리자 전용 금고** 주소로 들어가 본다 → **접근 거부(403)**.
         그 화면의 *운영 메모* 를 반드시 읽는다. 힌트가 들어 있다.
      5. 개발자도구 Cookies 목록에서 `MFSID` 값을 **더블클릭해 직접 고친다.**
      6. 금고 페이지에서 **F5(새로고침)**.
      ## ✅ 합격
      관리자로 변신해 관리자 전용 금고의 깃발을 CTFd 5번에 제출.
      ## 🤖 AI 도우미 질문 예시
      "쿠키 MFSID 값이 규칙적이면 그걸로 뭘 할 수 있어? 어떻게 바꿔 시험해?"
      ## 🧰 자주 막히는 곳
      - 쿠키를 고친 뒤 **새로고침을 안 함** → 반드시 F5.
      - 값에 공백·따옴표가 섞임 → 정확한 값만.
      - 편집이 안 되면 F12 콘솔에서: `document.cookie="MFSID=원하는값;path=/"` 후 F5.
      ## ⚠️ 윤리
      남의 세션을 베껴 쓰는 이 행위는 실제 서비스에서 하면 **명백한 범죄**(세션 하이재킹)다.
      오늘은 우리가 세운 연습용 표적에서만 한다.
    hint: "F12 → Cookies 에서 MFSID 규칙 관찰 → 더 이른 번호로 고치고 F5"
    category: web
    points: 20
    answer: |
      방법: MFSID 쿠키를 관리자의 이른 세션 값으로 교체 → 관리자 전용 금고에서 깃발.
      정확한 쿠키 값·경로·깃발은 solutions/SOLUTIONS.md 참조.
    answer_detail: "예측 가능한 세션(V14) 악용. 403 화면의 '운영 메모'가 규칙을 알려 주므로 학생이 무작정 찍지 않아도 된다. 쿠키 교체로 관리자 권한 획득 후 깃발 제출하면 통과. 응용 난이도."
    verify:
      type: ctfd_submit
      check: "CTFd 5번(예측 세션) 문제 정답 처리."
    target: victim

  - order: 6
    instruction: |
      ## 🎯 (응용·보스) 저장형 XSS — 관리자 봇 낚기
      글에 스크립트를 심고 **신고**해서, 그 글을 검토하는 관리자(봇)를 낚는다.
      ## 개념 한 줄(배운 곳: W03/W04 XSS)
      저장된 글이 필터 없이 출력되면, 그 글을 보는 사람의 브라우저에서 내 코드가 실행된다.
      ## 🔎 이렇게 시작한다 (브라우저만 — 화면을 따라가면 도착한다)
      1. `/register` 에서 계정을 만들고 **로그인**한다.
      2. **+ 새 글 쓰기** → 제목은 아무거나, **본문에 아래를 그대로** 적고 저장:
         ```
         <script>alert('xss')</script>
         ```
         (저장 직후 내 브라우저에서 경고창이 뜨면, 코드가 실행됐다는 증거다)
      3. 저장된 글 아래의 **[🚨 신고하기]** 버튼을 누른다.
         → "관리자 봇이 검토 대기열에 넣었습니다" 안내가 뜬다.
      4. robots.txt 에서 본 **관리자 콘솔**(`/admin`)로 간다.
      5. **[🤖 신고 검토(관리자 봇)]** 를 누른다. 봇이 신고된 글을 열어 본다.
      ## ✅ 합격
      관리자 봇이 스크립트를 발견하면 화면에 깃발이 나타난다 → CTFd 6번에 제출.
      ## 🤖 AI 도우미 질문 예시
