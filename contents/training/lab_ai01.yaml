lab_id: ezweb-ai01
title: "AI 서비스 정찰 — AICompanion 지도 그리기 + 공격 없이 새는 비밀 찾기"
course: ai-web-hacking
week: 101
description: |
  특별 세션 1주차 실습. 아직 공격하지 않는다. **브라우저로 둘러보기만** 한다.
  그런데 둘러보기만 해도 사내 AI 챗봇에서 주민번호·AWS 키·챗봇의 비밀 지침이 줄줄 샌다.
  이 실습은 100% 브라우저(크롬/엣지 + F12)로 진행하며, **진짜 AI 모델이 없어도** 전부 된다
  (표적이 mock 모드로 동작).
  표적: AICompanion `http://<victim-ip>:3005` · 계정 `alice / alice123`
difficulty: easy
duration_minutes: 120
prerequisites:
  - "Week 03~05 통과(F12 개발자도구·Network 탭 사용 경험)"
  - "내 PC에서 ./start.sh victim 으로 AICompanion(:3005) 기동"
  - "브라우저 + F12. curl 은 필요 없다."
objectives:
  - "LLM 앱의 구성요소(시스템 프롬프트·입력·지식베이스·도구·출력)를 화면에서 짚는다"
  - "지식베이스에서 PII·클라우드 키 유출을 직접 관측한다"
  - "F12 Network 로 화면 뒤의 API 를 '추측이 아니라 발견'으로 찾는다"
  - "디버그 엔드포인트에서 시스템 프롬프트 유출을 관측한다"
  - "발견을 OWASP LLM Top 10 에 매핑하고 우선순위표를 만든다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      표적에 로그인해서 "이 물건이 무엇을 하는지" 지도를 그린다.
      ## 개념 한 줄
      점검의 1단계는 공격이 아니라 정상 사용 흐름 익히기다.
      ## 💻 해보기 (브라우저만)
      1. `http://<victim-ip>:3005` 접속 → **login** → `alice` / `alice123`
      2. 상단 메뉴 네 개를 **전부 눌러 본다**:
         - **대화**(`/chat`) — 챗봇과 대화하는 화면. 아래에 공격형/방어형 **프리셋 버튼**이 있다.
         - **지식베이스**(`/kb`) — 챗봇이 참고하는 문서 목록.
         - **프로필**(`/profile`) — 내 정보와 '기억(memory)' 칸.
         - **⚙ 모델설정**(`/admin`) — 어떤 모델 서버를 쓸지 정하는 화면.
      3. 대화 화면에서 아무 말이나 걸어 본다. 예: `안녕? 너는 무슨 일을 해?`
      4. 네 화면이 각각 무슨 일을 하는지 **한 줄씩** 워크북에 적는다.
      ## ✅ 합격 기준
      네 화면의 역할을 자기 말로 적었고, 챗봇과 1회 이상 대화했다.
      ## 🧰 도움말
      - 챗봇 답이 짧고 기계적이어도 정상이다(mock 모드 — 진짜 모델 없이 흉내 내는 중).
      - 대화 화면 아래 프리셋 버튼은 다음 주에 본격적으로 쓴다. 오늘은 있다는 것만 확인.
    hint: "메뉴 네 개를 전부 눌러 보고 각각 무슨 화면인지 적는다"
    category: recon
    points: 15
    answer: |
      /chat 대화 · /kb 지식베이스(RAG 문서) · /profile 내 정보와 기억 · /admin 모델 서버 설정
    answer_detail: "정상 흐름 매핑. LLM 앱의 구성요소(입력·지식베이스·설정)를 화면과 1:1로 연결하는 것이 목적. 네 화면의 역할을 말할 수 있으면 통과."
    verify:
      type: manual
      check: "네 화면의 역할을 설명하고, 챗봇과 대화를 1회 이상 했다."
    target: victim

  - order: 2
    instruction: |
      ## 🎯 목표 (LLM06)
      지식베이스에서 **넣지 말았어야 할 자료**를 찾아낸다.
      ## 개념 한 줄
      챗봇에 연결한 자료 = 챗봇이 말할 수 있는 자료. 캐비닛에 넣는 순간 조수는 그걸 읊을 수 있다.
      ## 💻 해보기 (브라우저만)
      1. 상단 메뉴 **지식베이스**(`/kb`)로 간다.
      2. 문서를 하나씩 읽으며 아래 **세 가지**를 찾아 캡처한다:
         - ① 직원의 **주민등록번호**와 급여 계좌가 적힌 문서
         - ② **VIP 고객 명단**(이름·전화번호)이 적힌 문서
         - ③ **AWS 운영 서버 접근 키**(`AKIA...` 로 시작)가 적힌 문서
      3. 각각 옆에 한 줄씩 적는다: "이게 새면 무슨 일이 나나?"
      4. 페이지 맨 위 안내 문구도 읽어 둔다 — **누가 이 문서를 추가할 수 있다고 적혀 있나?**
      ## ✅ 합격 기준
      세 종류를 모두 찾아 캡처하고, 각각의 피해를 한 줄씩 적는다.
      ## 🧰 도움말
      - 키·주민번호는 전부 **가짜**다. 진짜처럼 생긴 가짜로 감각을 익히는 것이다.
      - 4번에서 읽은 안내 문구가 **다음 주 간접 인젝션 공격의 출발점**이 된다. 꼭 적어 둘 것.
    hint: "/kb 문서를 처음부터 끝까지 읽는다. AKIA 로 시작하는 문자열을 찾아라."
    category: leak
    points: 20
    answer: |
      ① HR 문서 — 직원 주민번호·급여 계좌
      ② CRM 문서 — VIP 고객 이름·전화번호
      ③ 인프라 문서 — AWS 액세스 키/시크릿
      페이지 안내: "누구나 추가 가능" 이라고 적혀 있음 (다음 주 RAG 오염의 단서)
    answer_detail: "LLM06 민감정보 노출. 실제 사고의 상당수가 '넣지 말았어야 할 자료를 AI에 연결'해서 발생한다. 세 종류 캡처 + 피해 서술이면 통과. 안내 문구(누구나 추가 가능)를 학생이 스스로 발견하게 하는 것이 2주차와의 연결고리다."
    verify:
      type: manual
      check: "주민번호·고객PII·AWS 키 세 종류를 모두 찾아 캡처했다."
    target: victim

  - order: 3
    instruction: |
      ## 🎯 목표
      화면 뒤에서 부르는 **API 주소**를 추측이 아니라 **발견**으로 찾는다.
      ## 개념 한 줄
      웹 화면은 껍데기다. 진짜 데이터는 뒤에서 API 를 불러 가져온다. F12 로 그게 다 보인다.
      ## 💻 해보기 (브라우저만)
      1. **대화** 화면에서 `F12` → **Network(네트워크)** 탭을 켠다.
      2. 챗봇에게 아무 말이나 걸어 본다. Network 목록에 새 줄이 생긴다.
      3. 새로 생긴 줄들을 클릭해 **주소(URL)** 와 **응답(Response)** 을 확인한다.
      4. 지식베이스·모델설정 화면에서도 같은 방법으로 관찰한다.
      5. 발견한 API 주소를 **최소 3개** 워크북에 적는다.
      6. 그중 하나를 **주소창에 직접 붙여 넣어** 결과를 확인한다.
      ## ✅ 합격 기준
      API 주소 3개 이상을 적고, 그중 하나를 주소창에서 직접 열어 응답을 확인했다.
      ## 🧰 도움말
      - Network 목록이 비어 있으면 F12 를 켠 채로 **화면을 다시 조작**해야 한다(새로고침 F5).
      - `Fetch/XHR` 필터를 누르면 API 호출만 골라 볼 수 있다.
      - 이 목록이 곧 **공격 표면 목록**이다. 다음 두 주에 여기를 하나씩 두드린다.
    hint: "F12 → Network → Fetch/XHR 필터. 화면을 조작하면 목록이 쌓인다."
    category: recon
    points: 15
    answer: |
      예: /api/chat (대화), /api/presets (프리셋 목록), /api/llm/models·/api/llm/config (모델설정) 등
      → 발견한 주소를 주소창에 직접 넣으면 JSON 이 그대로 열린다.
    answer_detail: "Week05 CTF 2번과 같은 기술(F12 Network 로 API 발견)의 재사용. '주소를 추측'하지 않고 '발견'하는 습관을 굳히는 것이 목적. 3개 이상 + 직접 열기 확인이면 통과."
    verify:
      type: manual
      check: "API 주소 3개 이상을 적고 하나를 주소창에서 직접 열었다."
    target: victim

  - order: 4
    instruction: |
      ## 🎯 목표 (LLM06) — 오늘의 하이라이트
      개발자가 지우지 않고 배포한 **디버그 문**으로 챗봇의 '사규'를 통째로 훔쳐본다.
      ## 개념 한 줄
      시스템 프롬프트는 챗봇에게 미리 심어 둔 초기 지침이다. 여기엔 비밀도 함께 적혀 있다.
      ## 💻 해보기 (브라우저만)
      1. 주소창에 그대로 입력한다:
         ```
         http://<victim-ip>:3005/api/debug/prompt
         ```
      2. 화면에 나온 내용을 캡처한다. 세 가지를 찾아 표시한다:
         - 챗봇에게 내려진 **비밀 규칙**(무엇을 하지 말라고 했나?)
         - **마스터 override 비밀번호**
         - **관리자 이메일**
      3. 워크북에 이 질문의 답을 적는다:
         **"비밀을 지키라는 지시와 그 비밀 자체가 같은 종이에 적혀 있다. 무엇이 잘못됐나?"**
      ## ✅ 합격 기준
      시스템 프롬프트 전문을 캡처하고, 위 설계 결함을 자기 말로 설명한다.
      ## 🧰 도움말
      - 이 주소는 3번 실습의 F12 관찰로도, 개발자 습관(`/api/debug/...`)으로도 도달할 수 있다.
      - 근본 방어: **비밀은 애초에 프롬프트에 넣지 않는다.** 필요하면 서버가 따로 보관하고,
        모델에는 "권한 확인 결과"만 넘긴다.
    hint: "개발자가 남겨 둔 디버그 주소를 열어 본다 (/api/debug/...)"
    category: leak
    points: 25
    answer: |
      GET /api/debug/prompt → 시스템 프롬프트 전문 + 마스터 비밀번호(ACME-OVERRIDE-2026) + 관리자 이메일
      설계 결함: 비밀을 지키라는 지시와 비밀 자체가 같은 컨텍스트에 있어, 프롬프트가 새면 비밀도 함께 샌다.
    answer_detail: "LLM06 시스템 프롬프트 유출. 디버그 엔드포인트 미제거는 실제로 매우 흔한 사고다. 학생이 '비밀을 컨텍스트에 넣으면 안 된다'는 근본 원칙을 말하면 통과. 이 값은 2주차 프롬프트 인젝션의 성공 판정 기준으로 재사용된다."
    verify:
      type: manual
      check: "시스템 프롬프트와 마스터 비밀번호를 캡처하고 설계 결함을 설명했다."
    target: victim

  - order: 5
    instruction: |
      ## 🎯 목표 (LLM06 / LLM10)
      회사의 **데이터와 모델 자체**도 훔칠 대상이라는 걸 확인한다.
      ## 개념 한 줄
      AI 서비스에서는 개인정보뿐 아니라 '학습·검색 데이터'와 '모델 정보'도 자산이자 표적이다.
      ## 💻 해보기 (브라우저만)
      주소창에 하나씩 넣어 결과를 확인·캡처한다.
      ```
      http://<victim-ip>:3005/api/dataset
      http://<victim-ip>:3005/api/model/export
      ```
      1. `/api/dataset` — 지식베이스 문서 **전부** + 사용자들이 나눈 **대화 기록 전부**가 나온다.
         (로그인하지 않아도 열리는지 시크릿 창으로도 확인해 보자)
      2. `/api/model/export` — 어떤 모델을 쓰는지, 가중치 파일이 어디 있는지 알려 준다.
      3. 각각 한 줄씩 적는다: **"이게 새면 회사에 어떤 손해인가?"**
      ## ✅ 합격 기준
      두 응답을 캡처하고, 각각의 피해를 한 줄씩 적는다.
      ## 🧰 도움말
      - 대화 기록에는 사람들이 챗봇에 털어놓은 내용이 그대로 들어 있다 — 그 자체가 개인정보다.
      - 모델은 회사가 돈과 시간을 들여 만든 자산이다. 통째로 복제되면 경쟁 우위가 사라진다.
    hint: "주소창에 /api/dataset 과 /api/model/export 를 넣어 본다"
    category: leak
    points: 15
    answer: |
      /api/dataset → RAG 문서 전체 + 대화 메시지 기록 (인증 0)
      /api/model/export → 모델명·가중치 위치·파라미터 정보 (인증 0)
    answer_detail: "LLM06/LLM10. 인증 없는 데이터·모델 덤프. 두 응답 캡처 + 피해 서술이면 통과."
    verify:
      type: manual
      check: "두 엔드포인트의 응답을 캡처하고 피해를 설명했다."
    target: victim

  - order: 6
    instruction: |
      ## 🎯 목표
      오늘 찾은 것을 **우선순위표**로 정리해, 다음 두 주의 공격 계획서를 만든다.
      ## 개념 한 줄
      점검자는 "다 위험해요"가 아니라 "이것부터 고치세요"를 말하는 사람이다.
      ## 💻 해보기 (워크북에 표 작성)
      아래 형식으로 **4건 이상** 정리한다.

      | 발견 | 위치(주소) | OWASP LLM | 영향(상/중/하) | 악용 난이도(쉬움/보통/어려움) | 우선순위 |
      |------|-----------|-----------|----------------|------------------------------|----------|
      | 지식베이스에 주민번호·AWS 키 | /kb | LLM06 | 상 | 쉬움 | 1 |
      | ... | ... | ... | ... | ... | ... |

      그리고 마지막에 한 문단으로 적는다:
      **"내가 이 회사 보안 담당자라면 오늘 당장 무엇부터 고치겠는가? 왜?"**
      ## ✅ 합격 기준
      4건 이상을 표로 정리하고, 1순위와 그 이유를 발표한다.
      ## 🧰 도움말
      - 우선순위는 보통 **영향이 크고 + 악용이 쉬운 것**이 1순위다.
      - 이 표가 다음 주 공격의 지도가 된다. 버리지 말 것.
    hint: "영향이 크고 악용이 쉬운 것이 1순위"
    category: report
    points: 10
    answer: |
      예시 1순위: 지식베이스의 PII/AWS 키 (LLM06, 영향 상 · 악용 쉬움 — 로그인만 하면 눈으로 보임)
      2순위: /api/debug/prompt 시스템 프롬프트 유출 (LLM06, 영향 상 · 악용 매우 쉬움)
      3순위: /api/dataset 대화·문서 덤프 (LLM06/LLM10, 인증 0)
      4순위: 기본 계정 admin/admin (A07)
    answer_detail: "발견을 위험도로 정렬하는 실무 감각. 4건 이상 + 1순위 근거 발표면 통과. 이 표를 2·3주차 실습 시작 시 다시 꺼내 '계획대로 진행 중인지' 점검하면 학습 효과가 커진다."
    verify:
      type: manual
      check: "발견 4건 이상을 우선순위표로 정리하고 1순위 근거를 발표했다."
    target: attacker
