lab_id: ezweb-week04
title: "AI 에이전트(Hermes)로 NeoBank 모의해킹 — 프롬프트 10단계 + 브라우저 교차 검증"
course: ai-web-hacking
week: 4
description: |
  Hermes Agent(Week 02에서 설치한 그 비서)가 가상 은행 NeoBank를 모의해킹한다. 학생은 아래
  프롬프트를 순서대로 복사→붙여넣기만 한다. 에이전트가 요청을 보내고 결과를 한국어로 설명한다.
  표적은 우리 실습용 NeoBank(:3001) 하나뿐이며, 학생은 일반 고객 alice로 시작해 은행이 숨긴
  ₩1억 비밀 계좌와 전 회원 개인정보까지 들여다본 뒤, AI가 점검 보고서를 자동 작성한다.

  ⭐ **이번 주의 규칙: 에이전트가 "찾았습니다"라고 할 때마다 브라우저로 직접 확인한다.**
  모든 단계에 `## 🖱️ 브라우저로 직접 확인` 절이 있다. 주소창 · 화면의 입력칸 · F12 콘솔
  세 가지 도구만 쓴다. 재현되지 않으면 그건 에이전트의 환각이며, 그걸 잡아내는 것도 실력이다.
  answer_detail의 기술 PoC는 강사용 참고.
difficulty: medium
duration_minutes: 360
prerequisites:
  - "Week 03 통과(SQLi·XSS·인증 개념 체득), 보안 서약 유효"
  - "Week 02에서 Hermes Agent 설치 + DGX Spark 오픈 모델 연결 완료 (hermes 실행 가능)"
  - "내 PC에서 ./start.sh victim 으로 NeoBank 기동, http://<victim-ip>:3001 접속 가능"
  - "브라우저(크롬/엣지/파이어폭스) + F12 개발자도구"
objectives:
  - "에이전트에게 점검 범위를 못 박고 정찰을 시작시킨다"
  - "IDOR로 admin 비밀 계좌(₩1억)를 열람하고, 브라우저 주소창으로 직접 재현한다"
  - "SQLi 로그인 우회와 데이터 추출을 재현한다"
  - "인증우회 헤더로 PII(주민번호·API키) 노출을 확인하고, F12 콘솔로 직접 재현한다"
  - "저장형 XSS를 심고, 권한상승을 재현한 뒤, 점검 보고서를 자동 생성한다"
  - "에이전트의 보고를 브라우저로 교차 검증하는 습관을 갖는다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 (프롬프트 0 — 범위 설정 + 프롬프트 1 — 정찰)
      에이전트에게 표적과 허락 범위를 못 박고, 정찰을 시킨다.
      ## 개념 한 줄
      공격 전 표적의 기술·버전을 먼저 파악한다. 낡은 버전은 그 자체로 약점이다.
      ## 💻 붙여넣을 프롬프트 (hermes 안에서, <victim-ip> 는 실제 IP)
      먼저 `cd ~/pentest && hermes` 로 에이전트를 켠 뒤, **범위 설정**부터:
      ```
      지금부터 너는 모의해킹 점검자야. 표적은 우리 실습용 NeoBank
      (http://<victim-ip>:3001) 하나뿐이고 절대 다른 사이트는 건드리지 마.
      curl 로 요청을 보내고, 찾은 것을 한국어로 쉽게 설명해줘.
      그리고 매번 "브라우저에서는 어떻게 확인하면 되는지"도 한 줄로 알려줘.
      ```
      이어서 **정찰**:
      ```
      NeoBank 를 정찰해줘. /version 과 /health 를 확인해서 어떤 웹 프레임워크와
      버전을 쓰는지, 알려진 보안 문제가 있는 버전인지 알려줘.
      ```
      ## 🖱️ 브라우저로 직접 확인
      주소창에 `http://<victim-ip>:3001/version` 을 입력한다.
      에이전트가 본 것과 **똑같은 JSON**이 화면에 그대로 뜬다.
      → "curl 과 브라우저는 같은 요청을 보내는 두 방법"임을 눈으로 확인하는 첫 단계.
      ## ✅ 합격 기준
      에이전트가 `Flask 1.0.2`(취약 버전), requests/PyJWT/Pillow 등 낡은 버전을 보고하고,
      학생이 브라우저 주소창으로 같은 내용을 확인한다.
      ## 🧰 옵션 풀이
      - `/version` 응답에 프레임워크·의존성 버전이 그대로 노출된다(정보 노출, OWASP A06).
      - 에이전트가 느리면 브라우저로 먼저 봐도 된다. 오늘 모든 단계는 브라우저로도 된다.
    hint: "/version 을 확인하라고 시키고, 주소창으로도 열어본다"
    category: recon
    points: 10
    answer: |
      프롬프트: "NeoBank 정찰 — /version /health 확인"
      브라우저: http://<victim-ip>:3001/version
      → Flask 1.0.2 등 취약 버전 노출.
    answer_detail: "GET /version → {framework: 'Flask 1.0.2 (CVE-2018-1000656 vulnerable)', deps:{requests 2.6.0, PyJWT 1.4.0, Pillow 8.0.0}}. 모두 알려진 CVE가 있는 낡은 버전. 정보 노출(A06)이며 후속 공격의 단서. 에이전트 보고 + 브라우저 확인이 모두 되면 통과."
    verify:
      type: manual
      check: "에이전트가 Flask 1.0.2 등 취약/구버전 노출을 보고했고, 학생이 브라우저에서도 확인했다."
    target: victim

  - order: 2
    instruction: |
      ## 🎯 목표 (프롬프트 2 — 로그인/기능 흐름 파악)
      일반 고객 alice 로 로그인해 어떤 페이지·기능이 있는지 지도를 그린다.
      ## 개념 한 줄
      점검자는 정상 사용 흐름을 먼저 익혀야, 어디를 비틀지 안다.
      ## 💻 붙여넣을 프롬프트
      ```
      NeoBank 에 일반 고객 계정(alice@example.com / alice123)으로 로그인하는 흐름을
      재현해줘. 로그인 후 /dashboard, /accounts/<내계좌id> 를 살펴보고, 어떤 기능
      (계좌 조회, 송금 /transfer, 검색 /search 등)이 있는지 목록으로 정리해줘.
      ```
      ## 🖱️ 브라우저로 직접 확인
      1. 브라우저로 `http://<victim-ip>:3001/login` 접속 → `alice@example.com / alice123` 로그인.
      2. 대시보드에서 내 계좌를 클릭 → **주소창의 번호를 적어 둔다** (예: `/accounts/2`).
         → 이 번호가 다음(프롬프트 4) IDOR 실습의 출발점이다.
      3. 상단 메뉴에서 송금·검색 화면이 어디 있는지 눈으로 익힌다.
      ## ✅ 합격 기준
      에이전트가 로그인에 성공하고 기능 목록을 정리하며, 학생도 브라우저로 로그인해 **내 계좌
      번호**를 확인한다.
      ## 🧰 옵션 풀이
      - 로그인은 `POST /login` (email/password 폼). 세션 쿠키로 이후 요청을 유지한다.
      - F12 → Application → Cookies 에서 세션 쿠키가 생긴 것도 함께 보면 좋다(W03 복습).
    hint: "alice 로 로그인 후 기능 지도 + 내 계좌 번호 확인"
    category: recon
    points: 8
    answer: |
      alice@example.com / alice123 로그인 → /dashboard, /accounts/<id>, /transfer, /search 기능 확인.
      학생은 브라우저에서 자기 계좌 id(주소창 숫자)를 확인해 둔다.
    answer_detail: "정상 흐름 매핑 단계. 에이전트가 alice 세션으로 기능 목록을 만들면 통과. 학생이 브라우저에서 자기 계좌 번호를 확인해 두면 다음 IDOR 단계가 자연스럽게 이어진다."
    verify:
      type: manual
      check: "alice 로그인 성공 + 기능 목록 정리 + 학생이 자기 계좌 번호를 말할 수 있다."
    target: victim

  - order: 3
    instruction: |
      ## 🎯 목표 (프롬프트 3 — 기본 자격증명)
      흔한 기본 계정(admin/admin)이 살아 있는지 점검한다.
      ## 개념 한 줄
      많은 시스템이 초기 관리자 계정을 안 바꾼 채 운영된다(가장 흔한 침투구).
      ## 💻 붙여넣을 프롬프트
      ```
      관리자 기본 자격증명이 남아 있는지 점검해줘. admin@neobank.local 에
      admin 같은 흔한 비밀번호로 로그인이 되는지 확인하고, 되면 어떤 권한이 보이는지 알려줘.
      ```
      ## 🖱️ 브라우저로 직접 확인
      1. **시크릿 창(새 사생활 보호 창)** 을 연다. (지금 alice 세션을 유지하기 위해)
      2. `http://<victim-ip>:3001/login` → `admin@neobank.local` / `admin` 으로 로그인.
      3. 관리자 화면이 열리는지 확인한 뒤 **시크릿 창을 닫는다.**
      ⚠️ 다음 단계부터는 반드시 **alice 로 로그인한 원래 창**에서 진행한다.
         (admin 으로 하면 "관리자니까 보이는 게 당연"해져 취약점의 의미가 사라진다)
      ## ✅ 합격 기준
      에이전트가 `admin@neobank.local / admin` 로그인 성공을 보고하고, 학생도 시크릿 창에서 확인한다.
      ## 🧰 옵션 풀이
      - 기본 자격증명(A07)은 점수는 낮아도 영향이 크다. 관리자 권한을 통째로 내준다.
    hint: "admin@neobank.local / admin — 확인은 시크릿 창에서"
    category: auth
    points: 10
    answer: |
      admin@neobank.local / admin 로그인 성공(기본 관리자 계정 미변경).
    answer_detail: "seed에 admin@neobank.local 비번이 'admin'으로 그대로 존재(V27). 에이전트 보고 + 학생의 시크릿 창 확인이면 통과. 이후 실습은 alice 세션 유지가 필수임을 반드시 강조할 것."
    verify:
      type: manual
      check: "admin/admin 관리자 로그인 성공 확인 후, alice 세션으로 복귀했다."
    target: victim

  - order: 4
    instruction: |
      ## 🎯 목표 (프롬프트 4 — IDOR, 오늘의 하이라이트)
      일반 고객 alice 가 남의(=admin) 비밀 계좌를 들여다본다.
      ## 개념 한 줄
      주소의 계좌 번호(id)만 바꿔도 막지 않으면 남의 데이터가 보인다(IDOR).
      ## 💻 붙여넣을 프롬프트
      ```
      alice 로 로그인한 상태에서 /accounts/1 부터 /accounts/5 까지 차례로 열어봐.
      내 계좌가 아닌데도 잔액과 거래내역이 보이는지, 특히 잔액이 비정상적으로 큰
      계좌가 있는지 찾아서 알려줘.
      ```
      ## 🖱️ 브라우저로 직접 확인 ★ (오늘 가장 중요)
      **alice 로 로그인한 브라우저**에서 주소창의 숫자만 바꿔 가며 열어 본다:
      ```
      http://<victim-ip>:3001/accounts/1
      http://<victim-ip>:3001/accounts/2
      http://<victim-ip>:3001/accounts/3
      http://<victim-ip>:3001/accounts/4
      http://<victim-ip>:3001/accounts/5   ← 여기!
      ```
      계좌번호 `9999-9999-9999`, 잔액 **₩100,000,000** 인 admin 비밀 계좌가 화면에 뜬다.
      **이 화면을 캡처한다 — 그게 점검 보고서의 '증거'다.**
      ## ✅ 합격 기준
      에이전트가 ₩100,000,000 규모의 admin 계좌를 찾아 보고하고, **학생이 브라우저에서 같은
      화면을 직접 띄워 캡처한다.**
      ## 🧰 옵션 풀이
      - `/accounts/<id>` 는 소유 검증 없이 누구 계좌든 보여준다(V01). id=5 = admin 비밀 슬러시 계좌.
      - 스스로에게 물어보자: **"나는 alice인데 왜 관리자 계좌가 보이지?"** → 서버가 소유자 확인을 안 했다.
    hint: "주소창의 계좌 번호를 1~5로 바꿔본다 → /accounts/5"
    category: idor
    points: 18
    answer: |
      /accounts/5 → account_number 9999-9999-9999, balance 100,000,000 (admin 비밀계좌) 노출.
      브라우저 주소창에서 숫자만 바꾸면 그대로 재현된다.
    answer_detail: "account_detail()은 current_user의 소유 여부를 확인하지 않아 임의 id 계좌를 노출(V01 IDOR). id=1은 admin 주계좌(₩999,999,999), id=5는 admin 슬러시(₩100,000,000). 에이전트 보고 + 학생의 브라우저 캡처가 모두 있으면 통과 — 학생이 가장 '우와'하는 지점이며, 증거 확보(캡처) 개념을 함께 가르친다."
    verify:
      type: manual
      check: "브라우저에서 /accounts/5 의 ₩1억 계좌 화면을 띄우고 캡처했다."
    target: victim

  - order: 5
    instruction: |
      ## 🎯 목표 (프롬프트 5 — SQLi 로그인 우회)
      비밀번호 없이 SQL 인젝션으로 관리자 로그인을 뚫는다.
      ## 개념 한 줄
      로그인 입력을 SQL에 그대로 합치면, 항상 참이 되는 글자로 인증을 건너뛸 수 있다.
      ## 💻 붙여넣을 프롬프트
      ```
      로그인 폼에 SQL 인젝션 취약점이 있는지 점검해줘. email 칸에
      ' OR 1=1-- 같은 페이로드를 넣어 비밀번호 없이 로그인되는지 확인하고,
      어떤 계정으로 로그인되는지 알려줘.
      ```
      ## 🖱️ 브라우저로 직접 확인
      1. 로그아웃한 뒤 `http://<victim-ip>:3001/login` 으로 간다.
      2. **이메일 칸**에 그대로 붙여넣는다:
         ```
         ' OR 1=1--
         ```
      3. **비밀번호 칸**엔 아무 글자나(예: `x`) 넣고 로그인을 누른다.
      4. 비밀번호를 한 번도 맞히지 않았는데 로그인된다.
      ⚠️ 확인 후 로그아웃하고 **다시 alice 로 로그인**해 둔다(다음 단계 준비).
      ## ✅ 합격 기준
      에이전트가 비번 없이 로그인 성공을 보고하고, 학생이 브라우저 폼에서 같은 결과를 재현한다.
      ## 🧰 옵션 풀이
      - 서버 쿼리: `SELECT * FROM users WHERE email='<입력>' AND password='<입력>'`.
      - `' OR 1=1--` 는 조건을 항상 참으로 만들고 뒤를 주석 처리해 첫 행(admin)으로 로그인시킨다.
      - 페이로드를 복사할 때 따옴표가 다른 모양(’)으로 바뀌지 않게 주의.
    hint: "로그인 화면 이메일 칸에 ' OR 1=1-- 를 그대로 입력"
    category: sqli
    points: 16
    answer: |
      email=' OR 1=1-- (password 아무거나) → 첫 사용자 admin 으로 로그인 성공.
      브라우저 로그인 폼에서 그대로 재현된다.
    answer_detail: "login()이 입력을 문자열 결합으로 쿼리에 넣어 SQLi 발생(V03). ' OR 1=1-- 는 WHERE를 참으로 만들고 비번 조건을 주석 처리 → 첫 행(id=1 admin)으로 세션 생성. 에이전트 보고 + 브라우저 재현이면 통과."
    verify:
      type: manual
      check: "브라우저 로그인 폼에 ' OR 1=1-- 를 넣어 비밀번호 없이 로그인되는 것을 확인했다."
