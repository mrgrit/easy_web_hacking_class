      ## 🎯 목표 ★ (오늘의 결승선) — 방어자로 전환: 설계도 + 점검 보고서
      3주간의 발견을 정리하고, 이 서비스를 **고치는 설계**를 직접 만든다.
      ## 개념 한 줄
      점검자의 가치는 "뚫었다"가 아니라 "고치게 도왔다"에 있다.
      ## 💻 해보기 — (A) 방어 설계도
      교과서 §3의 **다층 방어 5원칙**에 맞춰, 각 원칙마다 "지금 상태 → 이렇게 고친다"를 적는다.

      | 원칙 | 지금(취약) | 이렇게 고친다 |
      |------|-----------|---------------|
      | ① 비밀을 프롬프트에 넣지 않기 | 마스터 비번이 시스템 프롬프트 안에 | |
      | ② 검색 문서를 '자료'로 취급 | 문서를 시스템 영역에 그대로 붙임 | |
      | ③ 도구 권한 최소화 | 아무나 임의 코드 실행 | |
      | ④ 위험 작업은 사람 승인 | 묻지 않고 실행 | |
      | ⑤ 출력 검증·이스케이프 | 답을 innerHTML 로 렌더 | |

      여기에 **평범한 웹 보안** 항목도 3개 이상 추가한다(API 인증, 기본 비번 변경, 받을 필드 제한,
      디버그 엔드포인트 제거, 요청 수 제한 등).

      ## 💻 해보기 — (B) 점검 보고서
      3주간 찾은 것을 **6건 이상** 아래 형식으로 정리한다.

      | # | 발견 | 위치 | OWASP LLM | 재현 방법(브라우저 기준) | 영향 | 권장 대책 | 우선순위 |
      |---|------|------|-----------|--------------------------|------|-----------|----------|

      **선택 — 에이전트 활용:** Hermes Agent 에게 초안을 시켜도 된다(Week 04 프롬프트 10번과 같은
      방식). 단, **재현 방법을 브라우저로 직접 확인**해 검증한 뒤 제출한다. 재현 안 되는 항목은
      환각이므로 삭제하거나 수정한다.

      ## 💻 해보기 — (C) 발표
      **"내가 이 회사 보안 담당자라면 오늘 당장 무엇부터 고치겠는가? 왜?"** 를 1분 발표.
      ## ✅ 합격 기준
      방어 설계 표(5원칙 + 웹 보안 3개) + 점검 보고서 6건 이상 + 1분 발표.
      ## 🧰 도움말
      - 1순위는 보통 **영향이 크고 + 악용이 쉬운 것**이다.
      - 1주차에 만든 우선순위표를 꺼내 비교해 보자. 3주 사이에 생각이 어떻게 바뀌었는가?
      - 좋은 보고서는 "무엇이 뚫렸나"보다 **"무엇을 어떤 순서로 고칠까"** 가 더 길다.
