lab_id: ezweb-week01
title: "AI 에이전트와 인사하기 + 에이전트 지도 + 윤리 감각 깨우기"
course: ai-web-hacking
week: 1
description: |
  첫 실습. 아직 아무것도 설치하지 않아도 된다. 브라우저로 AI 챗봇에 말을 걸어 "AI가
  무엇인지" 손으로 느끼고, AI가 자신 있게 틀리는 순간(환각)을 직접 잡아낸다. 이어서
  요즘 쏟아지는 터미널 에이전트들의 지도를 그리며 **'몸(에이전트) + 머리(모델)'** 구조를
  손에 익힌다 — 다음 주에 우리가 직접 조립할 그 구조다. 마지막으로 "합법 vs 범죄"를
  가르는 윤리 OX 퀴즈를 풀고, 모든 주차의 입장권인 '보안 서약서'에 서명한다.
  컴퓨터를 처음 만지는 학생도 막힘없이 따라올 수 있게 설계했다.
difficulty: very_easy
duration_minutes: 75
prerequisites:
  - "인터넷이 되는 브라우저(크롬/엣지 등)"
  - "lecture_week01.md 의 §1~§6 을 읽고 옴"
objectives:
  - "프롬프트 한 줄로 AI가 결과물을 '생성'하는 것을 체험한다"
  - "AI가 그럴듯하게 틀리는 환각을 1건 이상 직접 찾아낸다"
  - "터미널 에이전트 3종 이상과 모델 3종 이상을 구분해 적고, 우리 반 조합을 설명한다"
  - "허락 유무로 합법/범죄를 구분하는 윤리 OX 를 통과한다"
  - "보안 서약서에 본인 이름으로 서명한다"
pass_threshold: 0.75
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      AI 챗봇에 말을 걸어, 글이 '생성'되는 것을 눈으로 확인한다.
      ## 개념 한 줄
      AI는 정답을 꺼내는 게 아니라 '그럴듯한 다음 말'을 한 단어씩 예측해 이어 붙인다(끝말잇기 천재).
      ## 💻 해보기
      1. 브라우저에서 강사가 안내하는 AI 챗봇을 연다.
      2. 입력창에 그대로 써넣는다:
         `고양이가 우주를 여행하는 4컷 동화를 재미있게 써줘.`
      3. 결과가 나오면, 같은 문장을 한 번 더 보낸다.
      ## ✅ 합격 기준
      동화 글이 나온다. 그리고 두 번의 결과가 '조금 다르다'는 것을 확인한다(= 정해진 답이 아님).
      ## 🧰 도움말
      - 챗봇이 없으면 강사가 안내하는 주소를 쓴다. 로그인만 하면 무료로 쓸 수 있는 것이 많다.
      - 다음 주부터는 우리 학교 서버(DGX Spark)의 오픈 모델에게 같은 방식으로 말을 건다.
    hint: "같은 프롬프트를 두 번 — 결과가 다르면 '예측 기계' 증거"
    category: observe
    points: 15
    answer: |
      프롬프트: "고양이가 우주를 여행하는 4컷 동화를 재미있게 써줘."
      → 매번 약간 다른 동화가 생성됨. 이것이 'AI=확률적 예측기' 라는 증거.
    answer_detail: "AI는 결정된 답을 저장해 두고 꺼내는 DB가 아니라, 매 단어를 확률로 예측한다. 그래서 같은 입력에도 결과가 달라진다. 채점은 학생이 생성된 동화 2개의 '다른 점'을 한 가지 말할 수 있으면 통과."
    verify:
      type: manual
      check: "동화 글이 생성되었고, 두 결과의 차이를 한 가지 말한다."

  - order: 2
    instruction: |
      ## 🎯 목표
      AI가 '자신 있게 틀리는' 환각을 직접 잡는다.
      ## 개념 한 줄
      AI는 모르는 것도 그럴듯하게 지어낸다. 그래서 AI의 말은 항상 사실 확인이 필요하다.
      ## 💻 해보기
      챗봇에 일부러 헷갈리는 것을 묻는다. 예:
      `세종대왕이 만든 스마트폰 모델명과 출시연도를 알려줘.`
      또는 존재하지 않는 책 제목을 만들어 "그 책 줄거리 알려줘" 라고 물어본다.
      ## ✅ 합격 기준
      AI가 '있지도 않은 사실'을 그럴듯하게 지어내는 답을 1건 캡처(화면 저장)한다.
      ## 🧰 도움말
      - 최신 AI는 "그건 존재하지 않습니다" 라고 바로잡기도 한다. 그러면 더 애매한 질문으로 한 번 더 시도.
      - 이 습관이 나중에 에이전트가 알려준 '취약점'을 검증할 때 그대로 쓰인다.
    hint: "존재하지 않는 것을 '사실인 척' 묻는다"
    category: observe
    points: 15
    answer: |
      예: "세종대왕이 만든 스마트폰..." → AI가 가짜 모델명/연도를 지어내면 그것이 환각.
    answer_detail: "환각(hallucination)은 학습한 패턴상 '그럴듯한' 문장을 만들지만 사실과 다른 경우다. 학생이 환각 답변을 1건 포착하면 통과. 이 경험이 '왜 AI 결과를 검증해야 하는지'의 근거가 된다."
    verify:
      type: manual
      check: "지어낸(사실이 아닌) AI 답변을 1건 캡처했다."

  - order: 3
    instruction: |
      ## 🎯 목표
      AI 에이전트가 '말'이 아니라 '행동'을 한다는 걸 본다(강사 시연 + 같이 보기).
      ## 개념 한 줄
      챗봇=조언자(말만), 에이전트=비서(직접 파일 생성·명령 실행). 이 차이가 특강의 핵심.
      ## 💻 해보기 (강사 화면을 함께 본다)
      강사가 에이전트에게 말한다:
      `지금 폴더에 hello.txt 파일을 만들고 안에 'AI 해킹 특강 1일차'라고 써줘.`
      → 화면에 hello.txt 파일이 '진짜로' 생긴다. 내용도 들어가 있다.
      ## ✅ 합격 기준
      "챗봇과 에이전트의 차이는 무엇인가?"에 '에이전트는 직접 행동한다'는 취지로 답한다.
      ## 🧰 도움말
      - 학생은 다음 주(Week 02)에 이 도구(Hermes Agent)를 본인 컴퓨터에 직접 설치한다. 오늘은 '구경'만.
    hint: "조언자 vs 비서"
    category: concept
    points: 15
    answer: |
      에이전트는 파일 생성·명령 실행 같은 '행동'을 직접 한다. 챗봇은 말(조언)만 한다.
    answer_detail: "AI 에이전트의 정의(스스로 도구를 사용해 작업을 완수)를 학생이 자기 말로 설명하면 통과. 다음 주차 Hermes Agent 설치의 동기 부여 단계다."
    verify:
      type: manual
      check: "'에이전트는 직접 행동한다'는 핵심 차이를 말한다."

  - order: 4
    instruction: |
      ## 🎯 목표
      요즘 에이전트들의 지도를 직접 그려 보고, '몸(에이전트) + 머리(모델)' 구조를 손에 익힌다.
      ## 개념 한 줄
      에이전트는 '몸'이고 모델(LLM)은 '머리'다. 둘은 따로따로이며, 갈아 끼울 수 있다.
      ## 💻 해보기 (종이/워크북에 표 그리기)
      1. 종이에 세로 두 칸짜리 표를 그린다. 왼쪽 칸 제목 **에이전트(몸)**, 오른쪽 칸 제목 **모델(머리)**.
      2. 왼쪽 칸에 아는 대로 적는다 — 예: OpenClaw, Claude Code, Codex CLI, Gemini CLI, opencode, Hermes Agent
      3. 오른쪽 칸에 적는다 — 예: GPT, Claude, Gemini, Llama, Qwen, DeepSeek
      4. **우리 반이 쓸 조합**에 동그라미를 친다: 왼쪽 `Hermes Agent`, 오른쪽 `DGX Spark 위의 오픈 모델`
      5. 옆에 한 문장으로 이유를 적는다. (계정 필요 없음 / 데이터가 학교 밖으로 안 나감 / 반 전체가 같은 조건)
      ## ✅ 합격 기준
      에이전트 3개 이상 + 모델 3개 이상을 적고, 우리 반 조합에 동그라미 + 이유 한 문장을 쓴다.
      ## 🧰 도움말
      - 이름을 외우는 게 목적이 아니다. "몸과 머리는 따로다"만 확실히 잡으면 된다.
      - 다음 주 설치가 정확히 이 그림대로 진행된다: 몸을 깔고 → 머리를 꽂는다.
    hint: "몸(에이전트)과 머리(모델)를 나눠 적는다"
    category: concept
    points: 20
    answer: |
      몸(에이전트): OpenClaw, Claude Code, Codex CLI, Gemini CLI, opencode, Hermes Agent
      머리(모델)  : GPT, Claude, Gemini, Llama, Qwen, DeepSeek
      우리 반 조합: Hermes Agent + DGX Spark 의 오픈 모델
      이유: 학생 개인 계정/결제가 필요 없고, 대화 내용이 학교 밖으로 나가지 않으며, 반 전체가 같은 조건에서 쓴다.
    answer_detail: "이 단계의 목적은 도구 암기가 아니라 구조 이해다. 에이전트(도구 실행 껍데기)와 모델(추론 두뇌)이 분리되며 교체 가능하다는 것을 학생이 자기 말로 설명하면 통과. Week 02 설치 실습의 정확한 지도가 된다."
    verify:
      type: manual
      check: "에이전트 3개 이상·모델 3개 이상을 구분해 적고, 우리 반 조합과 이유를 말한다."

  - order: 5
    instruction: |
      ## 🎯 목표
      합법과 범죄를 '허락' 기준으로 가른다.
      ## 개념 한 줄
      정보통신망법: 정당한 권한 없이 남의 시스템에 침입하면 처벌. '허락'이 모든 것을 가른다.
      ## 💻 해보기 (OX 퀴즈 — 종이/구두)
      1) 내가 만든 연습용 사이트의 약점을 찾는다. (O/X)
      2) 친구가 부탁해서 친구 블로그를 점검한다. (O/X)
      3) 호기심에 학교 홈페이지 관리자 로그인을 몰래 뚫어본다. (O/X)
      4) 회사와 계약하고 모의해킹을 한다. (O/X)
      5) 남의 SNS 비밀번호를 추측해 로그인해 본다. (O/X)
      6) 내가 직접 안 하고, AI 에이전트에게 "저 사이트 뚫어봐" 라고 시킨다. (O/X)
      ## ✅ 합격 기준
      정답을 5개 이상 맞힌다. (정답: 1)O 2)O 3)X 4)O 5)X 6)X)
      ## 🧰 도움말
      - 헷갈리면 "허락받았나?"만 떠올린다. 허락 없으면 거의 다 X.
      - 6번이 오늘의 핵심: **도구가 대신 해도 책임은 시킨 사람에게 있다.**
    hint: "허락받았나? 한 가지만 본다. 6번은 '시킨 사람 책임'"
    category: quiz
    points: 20
    answer: |
      1)O  2)O  3)X  4)O  5)X  6)X   — 허락 없는 3,5,6번이 범죄.
    answer_detail: "합법/범죄의 경계는 기술이 아니라 '허락(권한)'이다. 무단 침입(3,5)은 정보통신망법 위반. 6번은 에이전트 시대의 새 함정 — 실행 주체가 AI여도 지시자가 법적 책임을 진다. 허락/계약/본인 소유(1,2,4)는 합법. 5개 이상 정답이면 통과."
    verify:
      type: manual
      check: "OX 6문항 중 5개 이상 정답. 특히 6번의 이유를 설명한다."

  - order: 6
    instruction: |
      ## 🎯 목표
      모든 주차의 입장권 — '보안 서약서'에 서명한다.
      ## 개념 한 줄
      강력한 도구일수록 약속이 먼저다. 이 서약이 깨지면 특강이 아니라 사건이 된다.
      ## 💻 해보기
      강좌 사이트의 이 실습 페이지 상단에서 `보안서약서.docx` 를 내려받아 인쇄해 이름·학교·날짜·서명을 적는다.
      (인쇄가 어려우면 아래 문구를 종이/메모에 옮겨 적어도 된다.)
      "나 ___ 은(는) 이 특강의 허락된 실습 환경에서만 해킹 기술을 사용하며,
       타인의 시스템을 허락 없이 공격하지 않겠습니다.
       AI 에이전트에게 대신 시키는 것도 똑같이 하지 않겠습니다. (날짜/서명)"
      ## ✅ 합격 기준
      본인 이름과 날짜가 적힌 서약서를 제출한다.
      ## 🧰 도움말
      - 이 서약서는 강사가 보관한다. Week 02부터 실제 도구를 설치하므로, 서명자만 다음으로 간다.
    hint: "이름 + 날짜 + 서명"
    category: pledge
    points: 15
    answer: |
      서약 문구 + 본인 이름 + 날짜 + 서명. (AI 에이전트에게 시키는 경우 포함)
    answer_detail: "서약은 형식이 아니라 태도다. 학생이 직접 손으로 적고 서명하면 통과. 이후 모든 실습은 이 서약 위에서 이루어진다. 에이전트 대리 실행 조항이 포함된 것이 이번 개정의 핵심."
    verify:
      type: manual
      check: "이름·날짜·서명이 포함된 서약서를 제출했다."
